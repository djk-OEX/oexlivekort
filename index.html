          h += '<span class="oex-bp-time">'+escapeHtml(d.time)+'</span>';
          h += '</div>';
        });
      } else if (nextDep){
        h += '<div class="oex-bp-none">Ingen afgange nu</div>';
        h += '<div class="oex-bp-dep"><span class="oex-bp-line">'+escapeHtml(nextDep.routeShortName||'?')+'</span><span class="oex-bp-time">'+escapeHtml(nextDep.nextTime)+'</span></div>';
      } else {
        h += '<div class="oex-bp-none">Ingen afgange fundet</div>';
      }
      return h;
    }

    function showPopup(e){
      e.stopPropagation();
      const mapWrap = document.querySelector('.map-wrap');
      if (!mapWrap) return;
      // Toggle: close if same popup already open for this marker
      if (_busStopPopup && _busStopPopup._oexMarker === marker){
        _closeBusStopPopup(); return;
      }
      _closeBusStopPopup();
      const popup = document.createElement('div');
      popup.className = 'oex-busstop-popup';
      popup._oexMarker = marker;
      popup.innerHTML = buildPopupHtml();
      // Position popup over the marker element
      const markerEl = marker.getElement ? marker.getElement() : null;
      const wrapRect = mapWrap.getBoundingClientRect();
      if (markerEl){
        const mRect = markerEl.getBoundingClientRect();
        popup.style.left = (mRect.left - wrapRect.left + mRect.width / 2) + 'px';
        popup.style.top  = (mRect.top  - wrapRect.top) + 'px';
      } else {
        popup.style.left = '50%'; popup.style.top = '40%';
      }
      mapWrap.appendChild(popup);
      _busStopPopup = popup;
    }

    // Attach click to the marker's DOM element once it's ready
    function tryAttach(){
      const el = marker.getElement ? marker.getElement() : null;
      if (el){
        if (!el._oexBusPopupAttached){
          el._oexBusPopupAttached = true;
          el.style.cursor = 'pointer';
          el.addEventListener('click', showPopup);
        }
      }
    }
    // Azure Maps may not have rendered the element yet; try immediately and after a tick
    tryAttach();
    setTimeout(tryAttach, 200);
  }

  function _haversineDist(lat1, lng1, lat2, lng2){
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── GTFS local stop lookup ──────────────────────────────────────────────────
  let _gtfsStops = null;
  let _gtfsStopsLoading = null;
  let _gtfsRouteLookup = null;      // departure route_id → route_short_name (via trips_by_id + routes)
  let _gtfsRouteLongLookup = null;  // internal route_id → route_long_name
  let _gtfsTripToRoute = null;      // departure route_id (trip_id) → internal route_id
  let _gtfsTripHeadsign = null;     // trip_id → headsign (from trips_headsign.json, optional)
  let _gtfsRoutesLoading = null;
  let _gtfsRouteStops = null;       // internal route_id → [stop_ids]
  let _gtfsRouteStopsLoading = null;
  let _depsCacheKey = null;         // currently cached departure slot key
  let _depsCacheData = null;        // currently cached departure file data
  let _gtfsStopMap = null;          // stop_id → stop object (built lazily)
  let _gtfsStopToRoutes = null;     // stop_id → Set<internal_route_id> (built lazily)

  async function loadGtfsStops(){
    if (_gtfsStops) return _gtfsStops;
    if (_gtfsStopsLoading) return _gtfsStopsLoading;
    _gtfsStopsLoading = fetch('data/stops.json')
      .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(data => { _gtfsStops = Array.isArray(data) ? data : []; _gtfsStopsLoading = null; return _gtfsStops; })
      .catch(e => { console.warn('loadGtfsStops fejl:', e); _gtfsStops = []; _gtfsStopsLoading = null; return _gtfsStops; });
    return _gtfsStopsLoading;
  }

  async function loadGtfsRoutes(){
    if (_gtfsRouteLookup) return _gtfsRouteLookup;
    if (_gtfsRoutesLoading) return _gtfsRoutesLoading;
    _gtfsRoutesLoading = Promise.all([
      fetch('data/routes.json').then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); }),
      fetch('data/trips_by_id.json').then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).catch(() => ({})),
      fetch('data/trips_headsign.json').then(r => r.ok ? r.json() : {}).catch(() => ({}))
    ])
      .then(([routesData, tripsData, headsignData]) => {
        // Build internal route_id → short_name and route_id → long_name from routes.json
        const routeMap = {};
        const longMap = {};
        if (Array.isArray(routesData)){
          // Array schema: [{route_id, route_short_name, route_long_name}]
          routesData.forEach(r => {
            if (r.route_id && r.route_short_name) routeMap[r.route_id] = r.route_short_name;
            if (r.route_id && r.route_long_name)  longMap[r.route_id]  = r.route_long_name;
          });
        } else if (routesData && typeof routesData === 'object'){
          Object.entries(routesData).forEach(([k, v]) => { routeMap[k] = typeof v === 'string' ? v : k; });
        }
        // Build departure route_id → short_name using trips_by_id as bridge
        const lookup = {};
        if (tripsData && typeof tripsData === 'object' && !Array.isArray(tripsData)){
          Object.entries(tripsData).forEach(([depRouteId, internalRouteId]) => {
            const shortName = routeMap[internalRouteId];
            if (shortName) lookup[depRouteId] = shortName;
          });
        }
        // Also add direct entries from routeMap as fallback (only if not already mapped via trips_by_id)
        Object.entries(routeMap).forEach(([k, v]) => { if (!(k in lookup)) lookup[k] = v; });
        _gtfsRouteLookup = lookup;
        _gtfsRouteLongLookup = longMap;
        // Store trip_id → internal route_id for route stop lookups
        _gtfsTripToRoute = (tripsData && typeof tripsData === 'object' && !Array.isArray(tripsData)) ? tripsData : {};
        // Store trip_id → headsign for direction display
        _gtfsTripHeadsign = (headsignData && typeof headsignData === 'object') ? headsignData : {};
        _gtfsRoutesLoading = null;
        return _gtfsRouteLookup;
      })
      .catch(e => { console.warn('loadGtfsRoutes fejl:', e); _gtfsRouteLookup = {}; _gtfsRouteLongLookup = {}; _gtfsTripToRoute = {}; _gtfsTripHeadsign = {}; _gtfsRoutesLoading = null; return _gtfsRouteLookup; });
    return _gtfsRoutesLoading;
  }

  async function loadGtfsRouteStops(){
    if (_gtfsRouteStops) return _gtfsRouteStops;
    if (_gtfsRouteStopsLoading) return _gtfsRouteStopsLoading;
    _gtfsRouteStopsLoading = fetch('data/route_stops.json')
      .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(data => { _gtfsRouteStops = (data && typeof data === 'object') ? data : {}; _gtfsRouteStopsLoading = null; return _gtfsRouteStops; })
      .catch(e => { console.warn('loadGtfsRouteStops fejl:', e); _gtfsRouteStops = {}; _gtfsRouteStopsLoading = null; return _gtfsRouteStops; });
    return _gtfsRouteStopsLoading;
  }

  function _getDepartureSlotKey(){
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    // GTFS allows hours > 23 for after-midnight service
    if (h < 4) h += 24;
    const slotMin = Math.floor(m / 5) * 5;
    return String(h).padStart(2,'0') + '_' + String(slotMin).padStart(2,'0');
  }

  async function _loadDepartureWindow(slotKey){
    if (_depsCacheKey === slotKey && _depsCacheData !== null) return _depsCacheData;
    try{
      const r = await fetch('data/departures_5min/' + slotKey + '.json.gz');
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      _depsCacheKey = slotKey;
      _depsCacheData = (data && typeof data === 'object') ? data : {};
      return _depsCacheData;
    }catch(e){
      console.warn('_loadDepartureWindow fejl ('+slotKey+'):', e);
      _depsCacheKey = slotKey;
      _depsCacheData = {};
      return {};
    }
  }

  // Returns up to maxCount nearest GTFS stops within radiusMeters, sorted by distance.
  async function findNearestGtfsStops(lat, lng, maxCount, radiusMeters){
    if (maxCount === undefined) maxCount = 1;
    if (radiusMeters === undefined) radiusMeters = 800;
    try{
      const stops = await loadGtfsStops();
      if (!stops.length) return [];
      const latDelta = radiusMeters / 111320;
      const lonDelta = radiusMeters / (111320 * Math.cos(lat * Math.PI / 180));
      const candidates = [];
      for (let i = 0; i < stops.length; i++){
        const s = stops[i];
        if (s.lat < lat - latDelta || s.lat > lat + latDelta) continue;
        const sLon = s.lon !== undefined ? s.lon : s.lng;
        if (sLon < lng - lonDelta || sLon > lng + lonDelta) continue;
        const d = _haversineDist(lat, lng, s.lat, sLon);
        if (d <= radiusMeters){
          const stopId = s.stop_id !== undefined ? s.stop_id : s.id;
          candidates.push({ stop_id: stopId, name: s.name, lat: s.lat, lon: sLon, dist: Math.round(d) });
        }
      }
      candidates.sort((a, b) => a.dist - b.dist);
      return candidates.slice(0, maxCount);
    }catch(e){ console.warn('findNearestGtfsStops fejl:', e); return []; }
  }

  async function findNearestGtfsStop(lat, lng, radiusMeters){
    const results = await findNearestGtfsStops(lat, lng, 1, radiusMeters);
    return results.length ? results[0] : null;
  }

  async function fetchGtfsDepartures(stopId){
    try{
      const slotKey = _getDepartureSlotKey();
      const [depsWindow, routeLookup] = await Promise.all([
        _loadDepartureWindow(slotKey),
        loadGtfsRoutes()
      ]);
      const entries = depsWindow[stopId];
      if (!entries || !entries.length) return [];
      return entries.slice(0, 8).map(e => {
        const label = e.short_name || routeLookup[e.route_id] || e.route_id || '';
        const timeStr = (e.departure || e.arrival || '').substring(0, 5);
        const dir = e.headsign || (_gtfsTripHeadsign && _gtfsTripHeadsign[e.route_id]) || '';
        return { name: label, time: timeStr, dir };
      });
    }catch(e){ console.warn('fetchGtfsDepartures fejl:', e); return []; }
  }

  // Generates sorted GTFS slot keys covering one full service day (04:00–35:55),
  // then wraps back to 04:00. Used to scan for the next available departure.
  // Upper bound 35 covers GTFS extended times (28:xx–35:xx) used for overnight
  // services that continue well past midnight on the same service day.
  function _getDaySlotKeys(){
    const keys = [];
    for (let h = 4; h <= 35; h++){
      for (let m = 0; m < 60; m += 5){
        keys.push(String(h).padStart(2,'0') + '_' + String(m).padStart(2,'0'));
      }
    }
    return keys;
  }

  // Finds the next departure for stopId after the current time window.
  // Returns { routeShortName: string, nextTime: string } or null if not found.
  async function fetchNextGtfsDeparture(stopId){
    try{
      const routeLookup = await loadGtfsRoutes();
      const currentKey = _getDepartureSlotKey();
      const allKeys = _getDaySlotKeys();
      const currentIdx = allKeys.indexOf(currentKey);
      // Build search order: slots after current first, then wrap from start of day
      const ordered = currentIdx >= 0
        ? [...allKeys.slice(currentIdx + 1), ...allKeys.slice(0, currentIdx + 1)]
        : allKeys;
      const MAX_CHECKS = 60; // limit to ~5 hours (60 × 5 min slots) to avoid excessive requests
      let checked = 0;
      for (const key of ordered){
        if (checked >= MAX_CHECKS) break;
        checked++;
        try{
          const r = await fetch('data/departures_5min/' + key + '.json.gz');
          if (!r.ok) continue;
          const data = await r.json();
          const entries = data[stopId];
          if (entries && entries.length){
            const e = entries[0];
            const shortName = e.short_name || routeLookup[e.route_id] || e.route_id || '';
            const timeStr = (e.departure || e.arrival || '').substring(0, 8);
            return { routeShortName: shortName, nextTime: timeStr };
          }
        }catch(e){ continue; }
      }
      return null;
    }catch(e){ console.warn('fetchNextGtfsDeparture fejl:', e); return null; }
  }

  // Build a stop_id → stop object map from the already-loaded _gtfsStops array
  function _ensureGtfsStopMap(){
    if (_gtfsStopMap) return;
    _gtfsStopMap = new Map();
    if (_gtfsStops){
      _gtfsStops.forEach(s => {
        const id = String(s.stop_id !== undefined ? s.stop_id : (s.id || ''));
        if (id) _gtfsStopMap.set(id, s);
      });
    }
  }

  // Build reverse index: stop_id → Set<internal_route_id> from route_stops data
  function _ensureStopToRoutes(){
    if (_gtfsStopToRoutes) return;
    _gtfsStopToRoutes = new Map();
    if (_gtfsRouteStops){
      for (const [routeId, stopIds] of Object.entries(_gtfsRouteStops)){
        stopIds.forEach(sid => {
          const key = String(sid);
          if (!_gtfsStopToRoutes.has(key)) _gtfsStopToRoutes.set(key, new Set());
          _gtfsStopToRoutes.get(key).add(routeId);
        });
      }
    }
  }

  // Geographic deduplication threshold: stops within this distance (metres) are considered the same
  const _STOP_PROXIMITY_THRESHOLD_METERS = 50;
  // Maximum distance (metres) between stop2 and a route's stop to count as "route serves stop2".
  // Handles direction-split stops that share the same physical location with separate stop_ids.
  const _STOP2_MATCH_THRESHOLD_METERS = 200;

  // Attach a click popup to a route-stop marker; fetches departure times on demand
  function _attachRouteStopPopup(marker, stopName, routeName, stopId){
    async function showPopup(e){
      e.stopPropagation();
      const mapWrap = document.querySelector('.map-wrap');
      if (!mapWrap) return;
      if (_busStopPopup && _busStopPopup._oexMarker === marker){ _closeBusStopPopup(); return; }
      _closeBusStopPopup();
      const popup = document.createElement('div');
      popup.className = 'oex-busstop-popup';
      popup._oexMarker = marker;
      // Show loading state immediately
      let h = '<div class="oex-bp-title">🚏 '+escapeHtml(stopName)+'</div>';
      if (routeName) h += '<div class="oex-bp-dep"><span class="oex-bp-line">'+escapeHtml(routeName)+'</span><span class="oex-bp-time"> …</span></div>';
      popup.innerHTML = h;
      const markerEl = marker.getElement ? marker.getElement() : null;
      const wrapRect = mapWrap.getBoundingClientRect();
      if (markerEl){
        const mRect = markerEl.getBoundingClientRect();
        popup.style.left = (mRect.left - wrapRect.left + mRect.width / 2) + 'px';
        popup.style.top  = (mRect.top  - wrapRect.top) + 'px';
      } else {
        popup.style.left = '50%'; popup.style.top = '40%';
      }
      mapWrap.appendChild(popup);
      _busStopPopup = popup;
      // Fetch real departure times and update popup
      if (stopId){
        try{
          const deps = await fetchGtfsDepartures(stopId);
          const depArr = Array.isArray(deps) ? deps : [];
          const filtered = (routeName && depArr.length) ? depArr.filter(d => d.name === routeName) : depArr;
          let hUp = '<div class="oex-bp-title">🚏 '+escapeHtml(stopName)+'</div>';
          if (filtered && filtered.length){
            filtered.slice(0, 5).forEach(d => {
              hUp += '<div class="oex-bp-dep">';
              if (d.name) hUp += '<span class="oex-bp-line">'+escapeHtml(d.name)+'</span>';
              hUp += '<span class="oex-bp-time">'+escapeHtml(d.time)+'</span>';
              hUp += '</div>';
            });
          } else {
            if (routeName) hUp += '<div class="oex-bp-dep"><span class="oex-bp-line">'+escapeHtml(routeName)+'</span><span class="oex-bp-none"> – ingen afgange nu</span></div>';
            else hUp += '<div class="oex-bp-none">Ingen afgange fundet</div>';
          }
          if (_busStopPopup === popup) popup.innerHTML = hUp;
        }catch(_){}
      }
    }

    function tryAttach(){
      const el = marker.getElement ? marker.getElement() : null;
      if (el && !el._oexRsPopupAttached){
        el._oexRsPopupAttached = true;
        el.style.cursor = 'pointer';
        el.addEventListener('click', showPopup);
      }
    }
    tryAttach();
    setTimeout(tryAttach, 200);
  }

  // Find all stops sharing the next-departure route_id for the given stop,
  // then place small clickable pin markers on the map for each stop along the route.
  // shownStopIds: Set<string> – stop_ids already displayed (avoids duplicates across legs)
  // shownPositions: Array<[lat,lon]> – positions already shown (avoids geographic duplicates)
  // forcedTripId: optional trip_id to use directly instead of scanning for next departure
  // endStopId: optional stop_id – when provided, only shows dots for the segment
  // between stop1 and the end stop (i.e. A→transfer, transfer→B, or A→B).
  async function _findAndShowRouteStops(stop1, shownStopIds, shownPositions, forcedTripId, endStopId){
    if (!stop1 || !stop1.stop_id) return;
    try{
      const [routeLookup, routeStopsData] = await Promise.all([
        loadGtfsRoutes(),
        loadGtfsRouteStops()
      ]);
      await loadGtfsStops();
      _ensureGtfsStopMap();

      let tripId = forcedTripId || null;
      let routeShortName = '';

      if (!tripId){
      // Find the soonest departure at stop1 to identify which route is next
      const currentKey = _getDepartureSlotKey();
      const allKeys = _getDaySlotKeys();
      const currentIdx = allKeys.indexOf(currentKey);
      const ordered = currentIdx >= 0
        ? [...allKeys.slice(currentIdx), ...allKeys.slice(0, currentIdx)]
        : allKeys;

      const MAX_CHECKS = 60; // up to 60 × 5-min slots = 5 hours ahead
      let checked = 0;
      for (const key of ordered){
        if (checked >= MAX_CHECKS) break;
        checked++;
        try{
          const r = await fetch('data/departures_5min/' + key + '.json.gz');
          if (!r.ok) continue;
          const data = await r.json();
          const entries = data[stop1.stop_id];
          if (entries && entries.length){
            const e = entries[0];
            tripId = e.route_id;
            routeShortName = e.short_name || routeLookup[tripId] || tripId || '';
            break;
          }
        }catch(_){ continue; }
      }
      } // end if (!forcedTripId)
      if (tripId && !routeShortName) routeShortName = routeLookup[tripId] || tripId || '';
      if (!tripId) return;

      // Map trip_id → internal route_id, then look up all stops for that route
      const internalRouteId = (_gtfsTripToRoute && _gtfsTripToRoute[tripId]) || tripId;
      const stopIds = routeStopsData[internalRouteId];
      if (!stopIds || !stopIds.length) return;

      // Limit dots to the segment between stop1 and endStopId when both are found in the list.
      // Handles both forward (A→B) and reverse (B→A) stop ordering.
      let segmentStops = stopIds;
      if (endStopId) {
        const startSid = String(stop1.stop_id);
        const endSid   = String(endStopId);
        const idx1 = stopIds.findIndex(s => String(s) === startSid);
        const idx2 = stopIds.findIndex(s => String(s) === endSid);
        if (idx1 >= 0 && idx2 >= 0) {
          segmentStops = idx1 <= idx2
            ? stopIds.slice(idx1, idx2 + 1)
            : stopIds.slice(idx2, idx1 + 1);
        }
      }

      // Place a small pin marker for each stop along the route (or segment)
      // Skip: the originating stop itself, already-shown stop_ids, and geographically nearby stops
      for (const stopId of segmentStops){
        const sid = String(stopId);
        if (sid === String(stop1.stop_id)) continue;
        if (shownStopIds && shownStopIds.has(sid)) continue;
        const stopInfo = _gtfsStopMap.get(sid);
        if (!stopInfo) continue;
        const lat = stopInfo.lat;
        const lon = stopInfo.lon !== undefined ? stopInfo.lon : stopInfo.lng;
        if (!isValidLatLon(lat, lon)) continue;

        // Geographic deduplication: skip stops within threshold of an already-shown stop
        // (handles same physical stop having separate stop_ids per direction)
        let tooClose = false;
        if (shownPositions){
          for (const [sLat, sLon] of shownPositions){
            if (_haversineDist(lat, lon, sLat, sLon) < _STOP_PROXIMITY_THRESHOLD_METERS){ tooClose = true; break; }
          }
        }
        if (tooClose) continue;

        if (shownStopIds) shownStopIds.add(sid);
        if (shownPositions) shownPositions.push([lat, lon]);

        const marker = new atlas.HtmlMarker({
          position: [lon, lat],
          htmlContent: '<div class="oex-routestop-pin"></div>'
        });
        map.markers.add(marker);
        routeStopMarkers.push(marker);
        _attachRouteStopPopup(marker, stopInfo.name || sid, routeShortName, sid);
      }
    }catch(e){ console.warn('_findAndShowRouteStops fejl:', e); }
  }

  // Given stop1 (nearest to A) and stop2 (nearest to B), determines the bus legs:
  // - Single leg if stop2 is on the same route as stop1 (direct route)
  // - Two legs if a transfer stop is found (route1 → transfer → route2 → stop2)
  // - Falls back to two independent legs if no connection is found
  // skipSlots: number of 5-min slots to skip from current time (based on walking distance to stop1)
  // Returns array of leg objects: { stop, routeShortName, routeLongName, routeHeadsign, tripId, internalRouteId, isTransfer? }
  async function findTransitLegs(stop1, stop2, skipSlots){
    if (!stop1) return [];
    if (skipSlots === undefined) skipSlots = 1;
    try{
      const [routeLookup, routeStopsData] = await Promise.all([
        loadGtfsRoutes(),
        loadGtfsRouteStops(),
        loadGtfsStops()
      ]);
      _ensureStopToRoutes();
      _ensureGtfsStopMap();

      const allKeys = _getDaySlotKeys();
      const currentIdx = allKeys.indexOf(_getDepartureSlotKey());
      // Start all searches at currentIdx + skipSlots to give walking time to the stop
      const startIdx = currentIdx >= 0 ? Math.min(currentIdx + skipSlots, allKeys.length - 1) : skipSlots;

      // Helper: return a dep's headsign using inline field then trips_headsign lookup
      const depHeadsign = (e) => e ? (e.headsign || (_gtfsTripHeadsign && _gtfsTripHeadsign[e.route_id]) || '') : '';

      // Helper: return a dep's long name via the internal route_id → long_name lookup
      const depLongName = (internalRouteId) =>
        (internalRouteId && _gtfsRouteLongLookup && _gtfsRouteLongLookup[internalRouteId]) || '';

      // Helper: get first dep entry for a stop.
      // fromIdx defaults to startIdx (current time + skipSlots).
      // Pass an explicit fromIdx to start searching from a specific slot (e.g. leg1 departure time).
      const getFirstDep = async (stopId, fromIdx) => {
        const sid = String(stopId);
        const fi = (fromIdx !== undefined && fromIdx >= 0) ? fromIdx : startIdx;
        const ordered = [...allKeys.slice(fi), ...allKeys.slice(0, fi)];
        for (let i = 0; i < Math.min(60, ordered.length); i++){
          try{
            const r = await fetch('data/departures_5min/'+ordered[i]+'.json.gz');
            if (!r.ok) continue;
            const d = await r.json();
            if (d[sid] && d[sid].length) return d[sid][0];
          }catch(_){}
        }
        return null;
      };

      // Helper: find the connecting departure at stopId for transferRouteId after a previous
      // leg arrives at stopId via prevTripId at prevHHMM. Scans departure files to get the
      // real arrival time of prevTripId at stopId, then finds the first departure of
      // transferRouteId at that stop at or after that time.
      // Returns { entry, depTime, minTime } where minTime = actual arrival time used.
      const findConnectingDep = async (stopId, transferRouteId, prevTripId, prevHHMM) => {
        const allSlotKeys = _getDaySlotKeys();
        let arrivalHHMM = '';
        if (prevTripId && prevHHMM && prevHHMM.length >= 5) {
          const scanSlotKey = prevHHMM.substring(0, 2) + '_' + String(Math.floor(parseInt(prevHHMM.substring(3, 5)) / 5) * 5).padStart(2, '0');
          const scanSlotIdx = allSlotKeys.indexOf(scanSlotKey);
          const scanFrom = scanSlotIdx >= 0 ? scanSlotIdx : 0;
          const scanOrdered = [...allSlotKeys.slice(scanFrom), ...allSlotKeys.slice(0, scanFrom)];
          for (let si = 0; si < Math.min(24, scanOrdered.length) && !arrivalHHMM; si++) {
            try {
              const ra = await fetch('data/departures_5min/' + scanOrdered[si] + '.json.gz');
              if (!ra.ok) continue;
              const da = await ra.json();
              const ents = da[String(stopId)];
              if (ents && ents.length) {
                for (const ent of ents) {
                  if (ent.route_id === prevTripId) {
                    arrivalHHMM = (ent.departure || ent.arrival || '').substring(0, 5);
                    break;
                  }
                }
              }
            } catch(_) {}
          }
        }
        const minTime = arrivalHHMM || (prevHHMM || '');
        let slotStart = 0;
        if (minTime.length >= 5) {
          const tH = parseInt(minTime.substring(0, 2));
          const tM = parseInt(minTime.substring(3, 5));
          const nextSlotMins = Math.ceil((tH * 60 + tM) / 5) * 5;
          const nextH = Math.floor(nextSlotMins / 60);
          const nextM = nextSlotMins % 60;
          const nextSlotKey = String(nextH).padStart(2, '0') + '_' + String(nextM).padStart(2, '0');
          const ki = allSlotKeys.indexOf(nextSlotKey);
          if (ki >= 0) slotStart = Math.min(ki + skipSlots, allSlotKeys.length - 1);
        }
        const orderedSlots = [...allSlotKeys.slice(slotStart), ...allSlotKeys.slice(0, slotStart)];
        let entry = null;
        for (let ki2 = 0; ki2 < Math.min(96, orderedSlots.length) && !entry; ki2++) {
          try {
            const r2 = await fetch('data/departures_5min/' + orderedSlots[ki2] + '.json.gz');
            if (!r2.ok) continue;
            const dat2 = await r2.json();
            const ents2 = dat2[String(stopId)];
            if (ents2 && ents2.length) {
              for (const ent2 of ents2) {
                const resolvedRouteId = (_gtfsTripToRoute && _gtfsTripToRoute[ent2.route_id]) || ent2.route_id;
                if (resolvedRouteId === transferRouteId) {
                  const dep2HHMM = (ent2.departure || ent2.arrival || '').substring(0, 5);
                  if (minTime.length >= 5 && dep2HHMM.length >= 5 && dep2HHMM < minTime) continue;
                  entry = ent2; break;
                }
              }
            }
          } catch(_) {}
        }
        const depTime = entry ? (entry.departure || entry.arrival || '').substring(0, 5) : '';
        return { entry, depTime, minTime };
      };

      // Helper: build a transfer leg object from a connecting dep result.
      const makeLeg2Transfer = (transferStop, transferRouteId, conn) => ({
        stop: transferStop,
        routeShortName: conn.entry
          ? (conn.entry.short_name || routeLookup[conn.entry.route_id] || routeLookup[transferRouteId] || transferRouteId || '')
          : (routeLookup[transferRouteId] || transferRouteId || ''),
        routeLongName:  depLongName(transferRouteId),
        routeHeadsign:  depHeadsign(conn.entry),
        tripId: conn.entry ? conn.entry.route_id : transferRouteId,
        internalRouteId: transferRouteId,
        isTransfer: true,
        scheduledDepTime: conn.depTime,
        minDepartureTime: conn.minTime,
        fromStop: transferStop.name
      });

      // Build leg1 helper
      const makeLeg1 = (e1) => {
        const tripId1 = e1 ? e1.route_id : null;
        const shortName1 = e1 ? (e1.short_name || routeLookup[tripId1] || tripId1 || '') : '';
        const internalRoute1 = tripId1 ? ((_gtfsTripToRoute && _gtfsTripToRoute[tripId1]) || tripId1) : null;
        return {
          stop: stop1,
          routeShortName: shortName1,
          routeLongName:  depLongName(internalRoute1),
          routeHeadsign:  depHeadsign(e1),
          tripId: tripId1,
          internalRouteId: internalRoute1
        };
      };

      if (!stop2){
        const e1 = await getFirstDep(stop1.stop_id);
        return [makeLeg1(e1)];
      }

      const stop2Id = String(stop2.stop_id);

      // Helper: check whether a given list of stop IDs covers stop2, by exact ID or
      // by geographic proximity (≤200 m) to handle direction-split stops with separate IDs.
      const routeServesStop2 = (stopsOnRoute) => {
        if (stopsOnRoute.some(s => String(s) === stop2Id)) return true;
        if (stop2 && _gtfsStopMap) {
          const s2lat = stop2.lat, s2lon = stop2.lon;
          for (const s of stopsOnRoute) {
            const sInfo = _gtfsStopMap.get(String(s));
            if (!sInfo) continue;
            const sLon = sInfo.lon !== undefined ? sInfo.lon : sInfo.lng;
            if (_haversineDist(s2lat, s2lon, sInfo.lat, sLon) <= _STOP2_MATCH_THRESHOLD_METERS) return true;
          }
        }
        return false;
      };

      // ── Scan slots from startIdx to find a direct route to stop2 first ──
      // Always prefer a direct route over a transfer; check up to 60 forward windows.
      const orderedFromStart = [...allKeys.slice(startIdx), ...allKeys.slice(0, startIdx)];
      let bestDirectEntry = null;
      let firstEntry = null; // first departure at stop1 found (fallback for transfer search)
      for (let i = 0; i < Math.min(60, orderedFromStart.length); i++){
        try{
          const r = await fetch('data/departures_5min/'+orderedFromStart[i]+'.json.gz');
          if (!r.ok) continue;
          const d = await r.json();
          const entries = d[String(stop1.stop_id)];
          if (entries && entries.length){
            if (!firstEntry) firstEntry = entries[0];
            for (const e of entries){
              const internalRoute = ((_gtfsTripToRoute && _gtfsTripToRoute[e.route_id]) || e.route_id);
              const stopsOnRoute = routeStopsData[internalRoute] || [];
              if (routeServesStop2(stopsOnRoute)){
                bestDirectEntry = e;
                break;
              }
            }
          }
        }catch(_){ continue; }
        if (bestDirectEntry) break;
      }

      if (bestDirectEntry){
        return [makeLeg1(bestDirectEntry)];
      }

      // ── No direct route found – fall back to first dep and do transfer search ──
      const e1 = firstEntry || await getFirstDep(stop1.stop_id);
      const leg1 = makeLeg1(e1);
      const { internalRouteId: internalRoute1 } = leg1;
      const stopsOnRoute1 = internalRoute1 ? (routeStopsData[internalRoute1] || []) : [];

      // Direct route check with the first dep (covers case where all windows were empty)
      if (internalRoute1 && routeServesStop2(stopsOnRoute1)){
        return [leg1];
      }

      // Find transfer: look for a stop on route1 that is also served by a route that serves stop2
      if (internalRoute1 && stopsOnRoute1.length){
        const routesAtStop2 = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(stop2Id) || new Set()) : new Set();
        for (const stopId of stopsOnRoute1){
          const sid = String(stopId);
          if (sid === String(stop1.stop_id) || sid === stop2Id) continue;
          const routesAtSid = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(sid) || new Set()) : new Set();
          // Find a route that serves both this intermediate stop and stop2
          let transferRouteId = null;
          for (const r of routesAtSid){
            if (routesAtStop2.has(r)){ transferRouteId = r; break; }
          }
          if (!transferRouteId) continue;

          // Found transfer stop; look up stop info
          await loadGtfsStops();
          _ensureGtfsStopMap();
          const stopInfo = _gtfsStopMap.get(sid);
          if (!stopInfo) continue;
          const transferStop = {
            stop_id: sid,
            name: stopInfo.name || sid,
            lat: stopInfo.lat,
            lon: stopInfo.lon !== undefined ? stopInfo.lon : stopInfo.lng,
            dist: 0
          };

          const leg1TripId = e1 ? e1.route_id : null;
          const leg1HHMM = e1 ? (e1.departure || e1.arrival || '').substring(0, 5) : '';
          const conn = await findConnectingDep(sid, transferRouteId, leg1TripId, leg1HHMM);
          return [leg1, makeLeg2Transfer(transferStop, transferRouteId, conn)];
        }
      }

      // ── Long-name fallback: find inter-city route by matching route_long_name ──
      // When stop2 (e.g. nearest stop in Aalborg) is not listed in route_stops for
      // any candidate connecting route, try routes whose long_name contains
      // significant words from stop2.name (e.g. "Aalborg" → "Aarhus H - Aalborg").
      if (internalRoute1 && stopsOnRoute1.length) {
        await loadGtfsStops();
        _ensureGtfsStopMap();
        const stop2NameWords = (stop2.name || '').split(/[\s,\-\/\.]+/)
          .map(w => w.toLowerCase().trim())
          .filter(w => w.length >= 4);

        if (stop2NameWords.length) {
          for (const stopId of stopsOnRoute1) {
            const sid = String(stopId);
            if (sid === String(stop1.stop_id) || sid === stop2Id) continue;
            const routesAtSid = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(sid) || new Set()) : new Set();

            let transferRouteId = null;
            for (const r of routesAtSid) {
              const longName = (_gtfsRouteLongLookup && _gtfsRouteLongLookup[r]) || '';
              if (longName && stop2NameWords.some(w => longName.toLowerCase().includes(w))) {
                transferRouteId = r;
                break;
              }
            }
            if (!transferRouteId) continue;

            const stopInfo = _gtfsStopMap.get(sid);
            if (!stopInfo) continue;
            const transferStop = {
              stop_id: sid,
              name: stopInfo.name || sid,
              lat: stopInfo.lat,
              lon: stopInfo.lon !== undefined ? stopInfo.lon : stopInfo.lng,
              dist: 0
            };

            const connLN = await findConnectingDep(sid, transferRouteId, e1 ? e1.route_id : null, e1 ? (e1.departure || e1.arrival || '').substring(0, 5) : '');
            return [leg1, makeLeg2Transfer(transferStop, transferRouteId, connLN)];
          }
        }
      }

      // ── 2-hop transfer: route1 → transfer1 → route2 → transfer2 → route3 → stop2 ──
      // Used when no single-hop path exists (e.g. local bus → intercity → local bus in another city).
      if (internalRoute1 && stopsOnRoute1.length) {
        await loadGtfsStops();
        _ensureGtfsStopMap();
        const routesAtStop2for2hop = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(stop2Id) || new Set()) : new Set();
        const leg1TripId2h = e1 ? e1.route_id : null;
        const leg1HHMM2h   = e1 ? (e1.departure || e1.arrival || '').substring(0, 5) : '';
        const MAX_STOPS_2HOP = 60;
        let found2hop = null;
        outer2hop:
        for (const s1Id of stopsOnRoute1.slice(0, MAX_STOPS_2HOP)) {
          const sid1 = String(s1Id);
          if (sid1 === String(stop1.stop_id) || sid1 === stop2Id) continue;
          const routesAtS1 = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(sid1) || new Set()) : new Set();
          for (const r2 of routesAtS1) {
            if (r2 === internalRoute1) continue;
            const stopsOnR2 = routeStopsData[r2] || [];
            for (const s2Id of stopsOnR2.slice(0, MAX_STOPS_2HOP)) {
              const sid2 = String(s2Id);
              if (sid2 === sid1 || sid2 === String(stop1.stop_id)) continue;
              const routesAtS2 = _gtfsStopToRoutes ? (_gtfsStopToRoutes.get(sid2) || new Set()) : new Set();
              let r3 = null;
              for (const r of routesAtS2) {
                if (routesAtStop2for2hop.has(r)) { r3 = r; break; }
              }
              if (!r3) continue;
              found2hop = { sid1, r2, sid2, r3 };
              break outer2hop;
            }
          }
        }
        if (found2hop) {
          const { sid1, r2, sid2, r3 } = found2hop;
          const stopInfo1 = _gtfsStopMap.get(sid1);
          const stopInfo2 = _gtfsStopMap.get(sid2);
          if (stopInfo1 && stopInfo2) {
            const transferStop1 = {
              stop_id: sid1, name: stopInfo1.name || sid1,
              lat: stopInfo1.lat,
              lon: stopInfo1.lon !== undefined ? stopInfo1.lon : stopInfo1.lng,
              dist: 0
            };
            const transferStop2 = {
              stop_id: sid2, name: stopInfo2.name || sid2,
              lat: stopInfo2.lat,
              lon: stopInfo2.lon !== undefined ? stopInfo2.lon : stopInfo2.lng,
              dist: 0
            };
            const conn2 = await findConnectingDep(sid1, r2, leg1TripId2h, leg1HHMM2h);
            const leg2DepOrMinTime = conn2.depTime || conn2.minTime;
            const conn3 = await findConnectingDep(sid2, r3, conn2.entry ? conn2.entry.route_id : null, leg2DepOrMinTime);
            return [leg1, makeLeg2Transfer(transferStop1, r2, conn2), makeLeg2Transfer(transferStop2, r3, conn3)];
          }
        }
      }

      // No transfer found – show stop1 and stop2 as independent legs.
      // Search stop2 from leg1's departure time so leg2 is always after leg1.
      const leg1HHMM0 = e1 ? (e1.departure || e1.arrival || '').substring(0, 5) : '';
      let leg2StartIdx = startIdx;
      if (leg1HHMM0.length >= 5) {
        const l1H = parseInt(leg1HHMM0.substring(0, 2));
        const l1M = parseInt(leg1HHMM0.substring(3, 5));
        const l1SlotKey = String(l1H).padStart(2, '0') + '_' + String(Math.floor(l1M / 5) * 5).padStart(2, '0');
        const l1Ki = allKeys.indexOf(l1SlotKey);
        if (l1Ki >= 0) leg2StartIdx = l1Ki;
      }
      const e2 = await getFirstDep(stop2.stop_id, leg2StartIdx);
      const tripId2 = e2 ? e2.route_id : null;
      const shortName2 = e2 ? (e2.short_name || routeLookup[tripId2] || tripId2 || '') : '';
      const internalRoute2 = tripId2 ? ((_gtfsTripToRoute && _gtfsTripToRoute[tripId2]) || tripId2) : null;
      const leg2DepTime0 = e2 ? (e2.departure || e2.arrival || '').substring(0, 5) : '';
      return [leg1, {
        stop: stop2,
        routeShortName: shortName2,
        routeLongName:  depLongName(internalRoute2),
        routeHeadsign:  depHeadsign(e2),
        tripId: tripId2,
        internalRouteId: internalRoute2,
        scheduledDepTime: leg2DepTime0,
        minDepartureTime: leg1HHMM0
      }];

    }catch(e){ console.warn('findTransitLegs fejl:', e); return [{ stop: stop1, routeShortName: null, tripId: null, internalRouteId: null }]; }
  }

  function _renderRouteList(deps, filterName){
    const filtered = (filterName && deps && deps.length) ? deps.filter(d => d.name === filterName) : (deps || []);
    if (!filtered.length) return '<div class="oex-tp-deps"><div class="oex-tp-dep" style="color:#bbbbbb;font-size:12px;">Ingen afgange i dette tidsvindue</div></div>';
    let html = '<div class="oex-tp-deps">';
    filtered.slice(0, 5).forEach(d => {
      html += '<div class="oex-tp-dep">';
      if (d.name) html += '<span class="oex-tp-dep-line">'+escapeHtml(d.name)+'</span>';
      if (d.dir)  html += '<span class="oex-tp-dep-dir">→ '+escapeHtml(d.dir)+'</span>';
      html += '<span class="oex-tp-dep-time">'+escapeHtml(d.time)+'</span>';
      html += '</div>';
    });
    html += '</div>';
    return html;
  }

  // legs: array of { stop, routeShortName, routeLongName?, routeHeadsign?, deps, nextDep, isTransfer? }
  // Each leg gets its own section with bus line badge, stop info, departures and a clickable "Næste afgang" row
  function showTransitPanel(legs, hasB){
    const existing = document.getElementById('oex-transit-panel');
    if (existing) existing.remove();
    if (!legs || !legs.length) return;
    const panel = document.createElement('div');
    panel.id = 'oex-transit-panel';
    let html = '<div class="oex-tp-title">🚌 Bus A' + (hasB ? ' → B' : '') + '</div>';

    const multiTransfer = legs.filter(l => l.isTransfer).length >= 2;
    let transferCount = 0;
    legs.forEach((leg, i) => {
      const stop = leg.stop;
      if (!stop) return;
      const isFirst = i === 0;
      const isTransfer = !!leg.isTransfer;
      if (isTransfer) transferCount++;
      const lineBadge = leg.routeShortName ? '<span class="oex-tp-dep-line" style="font-size:15px;padding:2px 8px;">'+escapeHtml(leg.routeShortName)+'</span>' : '';
      // For transfer/connecting legs show "Origin → Headsign" when the departure stop (fromStop) is known.
      // For other legs show only "→ Headsign".
      const headsignText = leg.routeHeadsign || leg.routeLongName;
      const dirText = headsignText
        ? ' <span class="oex-tp-dep-dir" style="font-size:12px;">' +
          (leg.fromStop ? escapeHtml(leg.fromStop) + ' → ' : '→ ') +
          escapeHtml(headsignText) + '</span>'
        : '';
      const stopLabel = isFirst ? 'Fra A' : (isTransfer ? (multiTransfer ? 'Skift ' + transferCount : 'Skift') : 'Til B');
      const distText = stop.dist ? ' <span style="color:#bbbbbb;font-size:11px;">('+stop.dist+' m til fods)</span>' : '';

      html += '<div class="oex-tp-leg" style="margin-top:'+(isFirst?'4':'10')+'px;padding-top:'+(isFirst?'0':'8')+'px;'+(isFirst?'':'border-top:1px solid #333;')+'">';
      html += '<div style="display:flex;align-items:center;gap:7px;margin-bottom:3px;">'+lineBadge+dirText+
        '<span style="font-size:12px;"><strong>'+stopLabel+':</strong> '+escapeHtml(stop.name)+distText+'</span></div>';
      html += _renderRouteList(leg.deps, leg.routeShortName);

      // Always show clickable "Næste afgang" row
      const nextTime = (leg.nextDep && leg.nextDep.nextTime) ||
                       (leg.deps && leg.deps.length && leg.deps[0].time) || null;
      if (nextTime){
        html += '<div id="oex-next-dep-row-'+i+'" class="oex-tp-row oex-next-dep-btn" title="Klik for at vise/skjule stoppesteder på kortet">🚌 Næste afgang: '+escapeHtml(nextTime)+'</div>';
      }
      html += '</div>';
    });

    panel.innerHTML = html;
    const mapWrap = document.querySelector('.map-wrap');
    if (mapWrap) mapWrap.appendChild(panel);
  }

  async function findAndShowTransit(){
    clearBusDisplay();
    const lat1 = readNum("lat1"), lng1 = readNum("lng1"), lat2 = readNum("lat2"), lng2 = readNum("lng2");
    const hasA = isValidLatLon(lat1, lng1);
    const hasB = isValidLatLon(lat2, lng2);
    if (!hasA) return;

    // Get up to 5 nearest stops for point A within 500 m, plus the nearest stop for B.
    // Multiple candidates for A are tried in distance order; direct routes are preferred
    // over transfers, so a stop slightly further away that offers a direct route wins over
    // the nearest stop that only has a transfer connection.
    const [stop1Candidates, stop2] = await Promise.all([
      hasA ? findNearestGtfsStops(lat1, lng1, 5, 500) : Promise.resolve([]),
      hasB ? findNearestGtfsStop(lat2, lng2) : Promise.resolve(null)
    ]);

    // Try each stop1 candidate in distance order; use the first that yields a direct route.
    // A single-hop transfer is saved as a fallback so a direct route at a farther stop
    // still wins over a transfer at the nearest stop (the primary goal of multi-candidate
    // search).  2-hop (3-leg) results are saved separately as a last resort.
    // skipSlots scales with walking distance: max(1, floor(dist/50)) — 1 slot per 50 m.
    let legs = null;
    let stop1 = stop1Candidates[0] || null;
    let best2hopLegs = null;
    let best2hopStop = null;
    let bestTransferLegs = null;
    let bestTransferStop = null;
    for (const candidate of stop1Candidates){
      const skipSlots = Math.max(1, Math.floor((candidate.dist || 0) / 50));
      const candidateLegs = await findTransitLegs(candidate, hasB ? stop2 : null, skipSlots);
      const foundDirect = hasB && candidateLegs.length === 1;
      const foundTransfer = hasB && candidateLegs.length === 2 && !!candidateLegs[1].isTransfer;
      if (!hasB || foundDirect){
        // Direct route (or no destination) — use immediately; no need to check further candidates
        legs = candidateLegs;
        stop1 = candidate;
        break;
      }
      // Save the first valid single-hop transfer, then keep searching remaining candidates
      // for a direct route (which is always preferred over a transfer).
      if (foundTransfer && !bestTransferLegs){
        bestTransferLegs = candidateLegs;
        bestTransferStop = candidate;
      }
      // Save first 2-hop result; only use if no direct/single-hop is found at any candidate
      if (!best2hopLegs && hasB && candidateLegs.length >= 3 && candidateLegs.slice(1).some(l => l.isTransfer)){
        best2hopLegs = candidateLegs;
        best2hopStop = candidate;
      }
      // Keep the fallback result from the nearest candidate if nothing better turns up
      if (!legs){
        legs = candidateLegs;
        stop1 = candidate;
      }
    }
    // Promote single-hop transfer over fallback when no direct route was found
    const foundDirectAtAnyCandidate = legs && legs.length === 1;
    if (hasB && bestTransferLegs && !foundDirectAtAnyCandidate){
      legs = bestTransferLegs;
      stop1 = bestTransferStop;
    }
    // Promote 2-hop result when no direct or single-hop transfer was found
    if (hasB && best2hopLegs && legs && !(legs.length === 1 || (legs.length === 2 && !!legs[1].isTransfer))){
      legs = best2hopLegs;
      stop1 = best2hopStop;
    }
    if (!legs) legs = [];

    // Fetch departures and nextDep for each leg
    for (const leg of legs){
      if (leg.stop && leg.stop.stop_id){
        const allDeps = await fetchGtfsDepartures(leg.stop.stop_id);
        // Filter to this leg's bus line when known
        if (leg.routeShortName && allDeps && allDeps.length){
          const filtered = allDeps.filter(d => d.name === leg.routeShortName);
          leg.deps = filtered.length ? filtered : allDeps;
        } else {
          leg.deps = allDeps;
        }
        // For leg2: suppress any current-window entries that predate leg1 departure.
        // minDepartureTime is set on leg2 objects (both transfer and fallback) to ensure
        // the departure list never shows times before the user could realistically board.
        if (leg.minDepartureTime) {
          const minT = leg.minDepartureTime;
          leg.deps = leg.deps ? leg.deps.filter(d => !d.time || d.time >= minT) : leg.deps;
        }
        // Use the pre-calculated departure time (scheduledDepTime) for the connecting route
        // whenever it is available (transfer legs and fallback leg2), so the panel always
        // shows the correct route/time and the "Næste afgang" button appears.
        if (leg.scheduledDepTime) {
          const schedEntry = { name: leg.routeShortName, time: leg.scheduledDepTime };
          const hasRouteInDeps = leg.deps && leg.deps.some(d => d.name === leg.routeShortName);
          if (!hasRouteInDeps) {
            leg.deps = leg.deps && leg.deps.length ? [schedEntry, ...leg.deps] : [schedEntry];
          }
          leg.nextDep = { routeShortName: leg.routeShortName, nextTime: leg.scheduledDepTime };
        } else if (!leg.deps || !leg.deps.length){
          leg.nextDep = await fetchNextGtfsDeparture(leg.stop.stop_id);
        } else {
          leg.nextDep = { routeShortName: leg.routeShortName || (leg.deps[0] && leg.deps[0].name) || '', nextTime: leg.deps[0].time };
        }
      }
    }

    // Add 🚌 A marker for leg-1 stop (nearest to A)
    if (stop1){
      const m = new atlas.HtmlMarker({
        position: [stop1.lon, stop1.lat],
        htmlContent: '<div style="background:#000;color:#00B0F8;border:2px solid #00B0F8;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;font-family:sans-serif;white-space:nowrap;cursor:pointer;">🚌 A</div>'
      });
      map.markers.add(m); busMarkers.push(m);
      const l1 = legs[0] || {};
      _attachBusStopPopup(m, stop1, l1.deps || [], l1.nextDep || null);
    }
    // Add 🚌 ⇄ marker for every transfer leg (supports 1 or 2 transfers)
    legs.forEach((leg, i) => {
      if (i > 0 && leg.isTransfer && leg.stop && isValidLatLon(leg.stop.lat, leg.stop.lon)){
        const ts = leg.stop;
        const mt = new atlas.HtmlMarker({
          position: [ts.lon, ts.lat],
          htmlContent: '<div style="background:#000;color:#00B0F8;border:2px solid #00B0F8;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;font-family:sans-serif;white-space:nowrap;cursor:pointer;">🚌 ⇄</div>'
        });
        map.markers.add(mt); busMarkers.push(mt);
        _attachBusStopPopup(mt, ts, leg.deps || [], leg.nextDep || null);
      }
    });
    // Add 🚌 B marker for nearest stop to B
    if (stop2){
      const m = new atlas.HtmlMarker({
        position: [stop2.lon, stop2.lat],
        htmlContent: '<div style="background:#000;color:#00B0F8;border:2px solid #00B0F8;border-radius:6px;padding:2px 7px;font-size:12px;font-weight:700;font-family:sans-serif;white-space:nowrap;cursor:pointer;">🚌 B</div>'
      });
      map.markers.add(m); busMarkers.push(m);
      // For marker popup: use last leg's deps if it is not a transfer (independent fallback leg), else fetch stop2 deps
      const lastLeg = legs.length >= 2 ? legs[legs.length - 1] : null;
      const lFinal = (lastLeg && !lastLeg.isTransfer) ? lastLeg : null;
      if (lFinal && lFinal.deps){
        _attachBusStopPopup(m, stop2, lFinal.deps, lFinal.nextDep || null);
      } else {
        const d2 = await fetchGtfsDepartures(stop2.stop_id);
        const nd2 = (!d2 || !d2.length) ? await fetchNextGtfsDeparture(stop2.stop_id) : null;
        _attachBusStopPopup(m, stop2, d2, nd2);
      }
    }

    if (hasA && hasB){
      try{
        const url = 'https://atlas.microsoft.com/route/directions/json'+
          '?api-version=1.0'+
          '&travelMode=bus'+
          '&subscription-key='+encodeURIComponent(AZURE_MAPS_KEY)+
          '&query='+encodeURIComponent(`${lat1},${lng1}:${lat2},${lng2}`);
        const res = await fetch(url, { credentials:'omit' });
        if (res.ok){
          const data = await res.json();
          const route = (((data||{}).routes||[])[0]||{});
          let coords = [];
          const routeLegs = route.legs || [];
          routeLegs.forEach(leg=>{ (leg.points||[]).forEach(p=>{ if(isValidLatLon(p.latitude, p.longitude)){ coords.push([p.longitude,p.latitude]); } }); });
          if (coords.length >= 2){
            routeSource.add(new atlas.data.Feature(new atlas.data.LineString(coords)));
            const summary = route.summary || {};
            if (summary.lengthInMeters && summary.travelTimeInSeconds){
              const label = formatRouteLabel(summary.lengthInMeters, summary.travelTimeInSeconds);
              const mid = routeMidpoint(coords);
              routeLabelMarker = new atlas.HtmlMarker({
                position: mid,
                htmlContent: '<div style="background:#000000;color:#ffffff;padding:4px 10px;border-radius:4px;border:2px solid #00B0F8;font-size:13px;font-weight:bold;white-space:nowrap;font-family:sans-serif;">🚌 '+label+'</div>'
              });
              map.markers.add(routeLabelMarker);
            }
            try { map.setCamera({ bounds: atlas.data.BoundingBox.fromLatLngs(coords), padding: 60, duration: 500 }); } catch(e) {}
            setTimeout(safeResize, 50);
          }
        }
      }catch(e){ console.warn('Bus route fejl (forventet):', e); }
    }

    showTransitPanel(legs, hasB);

    // Attach per-leg "Næste afgang" click handlers (toggle route stop dots for that leg)
    _activeLegIdx = null;
    legs.forEach((leg, i) => {
      const el = document.getElementById('oex-next-dep-row-'+i);
      if (!el) return;
      el.addEventListener('click', async function(ev) {
        ev.stopPropagation();
        if (_activeLegIdx === i){
          // Toggle off
          _clearRouteStopDots();
          _routeDotsVisible = false;
          _activeLegIdx = null;
          el.classList.remove('active');
        } else {
          // Switch to this leg
          _clearRouteStopDots();
          legs.forEach((_, j) => {
            const prev = document.getElementById('oex-next-dep-row-'+j);
            if (prev) prev.classList.remove('active');
          });
          _activeLegIdx = i;
          _routeDotsVisible = true;
          el.classList.add('active');
          try {
            const shownPos = [];
            const shownIds = new Set([String(leg.stop.stop_id)]);
            // Determine end stop for segment filtering:
            // Leg 0 (A): show only up to the next leg's stop (transfer or B).
            // Transfer legs: show from transfer stop to the next leg's stop (or B if last transfer).
            // Non-transfer last leg: no segment filter (independent fallback leg).
            let segEndStopId = null;
            if (i === 0 && legs.length >= 2 && legs[1].stop) {
              segEndStopId = String(legs[1].stop.stop_id);
            } else if (leg.isTransfer) {
              const nextLeg = legs[i + 1];
              if (nextLeg && nextLeg.stop) {
                segEndStopId = String(nextLeg.stop.stop_id);
              } else if (stop2) {
                segEndStopId = String(stop2.stop_id);
              }
            }
            await _findAndShowRouteStops(leg.stop, shownIds, shownPos, leg.tripId, segEndStopId);
          } catch(err) { console.warn('Route dots fejl:', err); }
        }
      });
    });
  }

  function resetOptional(){ ["addr2","name2","lat2","lng2"].forEach(id => { const el = document.getElementById(id); if (el) el.value = ""; }); try { localStorage.removeItem("oex_addr2"); } catch(e) {} const s2 = document.getElementById("sug2"); if (s2) s2.style.display="none"; clearBusDisplay(); updateMapFromForm(false); }
  function setupPressAndHold(selector, delta){ const btn = document.querySelector(selector); if (!btn) return; let t = null; const step = () => { const cam = map.getCamera(); map.setCamera({ zoom: cam.zoom + delta, animate:true, duration:50 }); }; const start = () => { step(); if (!t) t = setInterval(step, 60); }; const stop = () => { if (t){ clearInterval(t); t = null; } }; btn.addEventListener('mousedown', start); document.addEventListener('mouseup', stop); btn.addEventListener('mouseleave', stop); btn.addEventListener('touchstart', (e)=>{ e.preventDefault(); start(); }, {passive:false}); document.addEventListener('touchend', stop); document.addEventListener('touchcancel', stop); }

  // ===== IP FALLBACK =====
  let _oexTriedIpFallback = false;
  function parseBoundsFromResult(r){
    if (!r) return null;
    if (r.viewport && r.viewport.topLeftPoint && r.viewport.btmRightPoint){
      const tl = r.viewport.topLeftPoint; const br = r.viewport.btmRightPoint;
      if (isFiniteNumber(tl.lat) && isFiniteNumber(tl.lon) && isFiniteNumber(br.lat) && isFiniteNumber(br.lon))
        return [tl.lon, br.lat, br.lon, tl.lat];
    }
    if (r.boundingBox && r.boundingBox.northEast && r.boundingBox.southWest){
      const ne = r.boundingBox.northEast; const sw = r.boundingBox.southWest;
      if (isFiniteNumber(ne.lat) && isFiniteNumber(ne.lon) && isFiniteNumber(sw.lat) && isFiniteNumber(sw.lon))
        return [sw.lon, sw.lat, ne.lon, ne.lat];
    }
    return null;
  }
  async function oexIpFallbackCenter(){
    if (_oexTriedIpFallback) return;
    try{
      const ipUrl = 'https://atlas.microsoft.com/geolocation/ip/json?api-version=1.0&subscription-key=' + encodeURIComponent(AZURE_MAPS_KEY);
      const ipRes = await fetch(ipUrl, {credentials:'omit'});
      if(!ipRes.ok){ console.warn('IP fallback HTTP', ipRes.status); throw new Error('HTTP '+ipRes.status); }
      const ipData = await ipRes.json();
      let lat=null, lng=null, bbox=null, cc=null;
      if (ipData && ipData.location && isFiniteNumber(ipData.location.lat) && isFiniteNumber(ipData.location.lon)){
        lat = ipData.location.lat; lng = ipData.location.lon;
      }
      if (ipData && ipData.countryCode){ cc = ipData.countryCode; }
      if ((lat===null || lng===null) && cc){
        const fUrl = 'https://atlas.microsoft.com/search/fuzzy/json?api-version=1.0&limit=1&subscription-key=' + encodeURIComponent(AZURE_MAPS_KEY) + '&query=' + encodeURIComponent(cc);
        const fRes = await fetch(fUrl, {credentials:'omit'});
        if (fRes.ok){
          const fData = await fRes.json();
          const r = (fData && fData.results && fData.results[0]) || null;
          bbox = parseBoundsFromResult(r);
          if (!bbox && r && r.position && isValidLatLon(r.position.lat, r.position.lon)){
            lat = r.position.lat; lng = r.position.lon;
          }
        }
      }
      const latEl = document.getElementById('lat1');
      const lngEl = document.getElementById('lng1');
      const nameEl = document.getElementById('name1');
      if (isValidLatLon(lat,lng)){
        if (latEl) latEl.value = lat.toFixed(6);
        if (lngEl) lngEl.value = lng.toFixed(6);
        if (nameEl && !nameEl.value.trim()) nameEl.value = 'IP-LOKATION (GROV)';
        await updateMapFromForm(false, true);
        safeSetCenter(lat, lng, 8.5, 600);
        setStatusChip('IP • GROV' + (cc?(' ('+cc+')'):'') , false);
        _oexTriedIpFallback = true;
      } else if (Array.isArray(bbox) && bbox.length===4 && bbox.every(isFiniteNumber)){
        if (nameEl && !nameEl.value.trim()) nameEl.value = 'IP-LOKATION (LAND)';
        await updateMapFromForm(false, true);
        try{ map.setCamera({ bounds: bbox, padding: 60, duration: 600 }); }catch(e){}
        setStatusChip('IP • GROV' + (cc?(' ('+cc+')'):'') , false);
        _oexTriedIpFallback = true;
      } else {
        console.warn('IP fallback: ingen brugbar lokation/bounds. Ingen zoom.');
      }
    }catch(e){ console.warn('IP fallback fejlede', e); }
  }

  // ===== Min position / Auto-track =====
  async function oexGetMyPosition(){
    if (!navigator.geolocation){ alert('Geolocation ikke understøttet i denne browser. Viser grov IP-lokation.'); await oexIpFallbackCenter(); return; }
    const geoget = (opts)=> new Promise((resolve,reject)=>{ navigator.geolocation.getCurrentPosition(resolve, reject, opts); });
    let pos=null;
    try{ pos = await geoget({ enableHighAccuracy:true, timeout:8000, maximumAge:0 }); }
    catch(e1){
      try{ pos = await geoget({ enableHighAccuracy:false, timeout:8000, maximumAge:60000 }); }
      catch(e2){ await oexIpFallbackCenter(); alert('Kunne ikke hente præcis position. Viser grov IP-lokation.'); return; }
    }
    if (!pos || !pos.coords){ await oexIpFallbackCenter(); return; }
    const lat = Number(pos.coords.latitude), lng = Number(pos.coords.longitude);
    if (!isValidLatLon(lat,lng)){ await oexIpFallbackCenter(); return; }
    const latEl = document.getElementById('lat1'); const lngEl = document.getElementById('lng1'); const nameEl = document.getElementById('name1');
    if (latEl) latEl.value = lat.toFixed(6); if (lngEl) lngEl.value = lng.toFixed(6); if (nameEl && !nameEl.value.trim()) nameEl.value = 'MIN POSITION';
    const addrEl = document.getElementById('addr1'); if (addrEl && !addrEl.value.trim()) addrEl.value = 'MIN POSITION';
    const hdg = (pos.coords && typeof pos.coords.heading === 'number' && Number.isFinite(pos.coords.heading)) ? pos.coords.heading : null; if (hdg !== null) { try{ map.setCamera({ bearing: hdg }); }catch(e){} }
    setStatusChip('LIVE • GPS', true);
    updateMapFromForm(false);
  }
  function updateGpsStatus(on){ setStatusChip(on? 'LIVE • GPS':'PAUSE', !!on); }
  let oexWatchId = null; let oexAutoCenter = true;
  function oexStartAutoTrack(options={highAccuracy:true}){
    if (!('geolocation' in navigator)) { alert('Geolocation ikke understøttet i denne browser. Viser grov IP-lokation.'); oexIpFallbackCenter(); return; }
    if (oexWatchId!==null) return; updateGpsStatus(true);
    try{
      oexWatchId = navigator.geolocation.watchPosition(
        (pos)=>{
          if(!pos||!pos.coords) return; const lat=Number(pos.coords.latitude), lng=Number(pos.coords.longitude); if(!isValidLatLon(lat,lng)) return;
          const latEl=document.getElementById('lat1'); const lngEl=document.getElementById('lng1'); const nameEl=document.getElementById('name1');
          if (latEl) latEl.value=lat.toFixed(6); if (lngEl) lngEl.value=lng.toFixed(6); if (nameEl && !nameEl.value.trim()) nameEl.value='MIN POSITION';
          updateMapFromForm(true, true);
          if (oexAutoCenter){ try{ const cam=map.getCamera(); map.setCamera({ center:[lng,lat], zoom: cam.zoom||15.5, duration:300 }); }catch(e){} }
          try{ if(typeof pos.coords.heading==='number' && Number.isFinite(pos.coords.heading)){ map.setCamera({ bearing: pos.coords.heading }); } }catch(e){}
        },
        async (err)=>{
          console.warn('watchPosition fejl:', err);
          const msg = err && err.code===1 ? 'TILLADELSE NÆGTET' : (err && err.code===2 ? 'POSITION UTILGÆNGELIG' : 'TIMEOUT');
          setStatusChip(msg, false);
          await oexIpFallbackCenter();
          updateGpsStatus(false);
        },
        { enableHighAccuracy: !!options.highAccuracy, maximumAge: 5000, timeout: 10000 }
      );
    }catch(e){ console.error('Kunne ikke starte auto-tracking:', e); }
  }
  function oexStopAutoTrack(){ if (oexWatchId!==null){ try{ navigator.geolocation.clearWatch(oexWatchId); }catch(_){} oexWatchId=null; } updateGpsStatus(false); }

  // ===== DEL / SHARE =====
  function oexBuildShareUrl(){
    try{
      const cam = map && map.getCamera ? map.getCamera() : {};
      const center = cam && cam.center ? cam.center : [10.2039,56.1629];
      const zoom = (cam && typeof cam.zoom==='number' && Number.isFinite(cam.zoom)) ? cam.zoom : 12;
      const bearing = (cam && typeof cam.bearing==='number' && Number.isFinite(cam.bearing)) ? cam.bearing : 0;
      const pitch = (cam && typeof cam.pitch==='number' && Number.isFinite(cam.pitch)) ? cam.pitch : 0;
      const params = new URLSearchParams();

      const a1 = (document.getElementById('addr1')?.value||'').trim();
      const a2 = (document.getElementById('addr2')?.value||'').trim();
      if(a1) params.set('addr1', a1);
      if(a2) params.set('addr2', a2);

      const lat1 = (document.getElementById('lat1')?.value||'').trim();
      const lng1 = (document.getElementById('lng1')?.value||'').trim();
      const lat2 = (document.getElementById('lat2')?.value||'').trim();
      const lng2 = (document.getElementById('lng2')?.value||'').trim();
      if(lat1 && lng1){ params.set('pos1', `${lat1},${lng1}`); }
      if(lat2 && lng2){ params.set('pos2', `${lat2},${lng2}`); }

      if(Array.isArray(center) && center.length===2){ params.set('center', `${center[1].toFixed(6)},${center[0].toFixed(6)}`); }
      params.set('zoom', Number(zoom||0).toFixed(2));
      params.set('bearing', Number(bearing||0).toFixed(1));
      params.set('pitch', Number(pitch||0).toFixed(1));

      const live = document.getElementById('oex-gps-status')?.textContent?.includes('LIVE') ? '1' : '0';
      params.set('live', live);
      params.set('view', _oexView);

      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      return url;
    }catch(e){ console.warn('oexBuildShareUrl fejl', e); return location.href; }
  }
  function oexShareCurrentView(){
    const url = oexBuildShareUrl();
    if(navigator.share){ try{ navigator.share({ title: document.title || 'OEX Kort', url }); }catch(_){} }
    try{ window.prompt('Kopiér link til visningen:', url); }catch(_){ }
    if(navigator.clipboard && navigator.clipboard.writeText){
      navigator.clipboard.writeText(url).then(()=>{
        setStatusChip('LINK KOPIERET', false);
        setTimeout(()=>{ const live = (oexWatchId!==null); setStatusChip(live? 'LIVE • GPS':'PAUSE', live); }, 1200);
      }).catch(()=>{});
    }
  }

  window.addEventListener("DOMContentLoaded", initMap);
  </script>
