<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <title>OEX Kort – Live, Rute & Stopdata</title>

  <!-- Azure Maps SDK -->
  https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css
  https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js

  <!-- OEX BRANDING -->
  <style>
    :root{
      --oex-bg:#000;
      --oex-text:#fff;
      --oex-accent:#00B0F8;
      --oex-fig:#363636;
    }
    html,body{
      margin:0;
      height:100%;
      background:var(--oex-bg);
      color:var(--oex-text);
      font-family:system-ui,Segoe UI,Roboto;
    }
    header{
      background:#000;
      padding:10px 12px;
      border-bottom:1px solid var(--oex-fig);
      position:sticky;
      top:0;
      z-index:50;
    }
    .content{
      max-width:1200px;
      margin:0 auto;
    }
    .logo{
      height:48px;
      margin-bottom:10px;
    }
    .form-grid{
      display:grid;
      grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
      gap:12px;
    }
    .card{
      background:#0b0b0b;
      border:1px solid var(--oex-fig);
      border-radius:10px;
      padding:12px;
      position:relative;
    }
    label{font-size:12px;margin:6px 0 4px;display:block;}
    input{
      width:100%;
      padding:8px;
      border-radius:8px;
      border:1px solid var(--oex-fig);
      background:#121212;
      color:#fff;
    }
    button{
      padding:10px 14px;
      border-radius:8px;
      font-weight:700;
      cursor:pointer;
      border:none;
    }
    button.primary{background:var(--oex-accent);color:#00131B;}
    button.secondary{background:transparent;color:var(--oex-accent);border:1px solid var(--oex-fig);}
    .oex-chip{
      display:inline-flex;
      gap:8px;
      align-items:center;
      padding:6px 10px;
      border-radius:999px;
      border:1px solid var(--oex-fig);
      background:#0b0b0b;
    }
    .oex-chip-on{border-color:var(--oex-accent);}
    .oex-chip .dot{
      width:8px;height:8px;border-radius:50%;background:var(--oex-accent);
    }
    .suggestions{
      position:absolute;left:12px;right:12px;background:#111;
      border:1px solid var(--oex-fig);max-height:180px;overflow:auto;
      z-index:100;display:none;
    }
    .suggestion{
      padding:8px;cursor:pointer;border-top:1px solid #222;
    }
    #map{
      height:100%;
      flex:1;
    }
    .map-wrap{
      flex:1;position:relative;
    }
  </style>
</head>

<body>

<header>
  <div class="content">
    
    <!-- ⭐ DIT LOGO ER TILBAGE ⭐ -->
    <img class="logo"
      src="https://oexazfilkonto.blob.core.windows.net/oexazfillager/OEXADMAZSTORTILPASSET.png"
      alt="OEX">

    <div class="form-grid">

      <!-- PUNKT A -->
      <div class="card">
        <label for="addr1">Adresse A</label>
        <input id="addr1" placeholder="Startadresse">
        <div id="sug1" class="suggestions"></div>
        <input id="lat1" type="hidden">
        <input id="lng1" type="hidden">
      </div>

      <!-- PUNKT B -->
      <div class="card">
        <label for="addr2">Adresse B</label>
        <input id="addr2" placeholder="Slutadresse">
        <div id="sug2" class="suggestions"></div>
        <input id="lat2" type="hidden">
        <input id="lng2" type="hidden">
      </div>

    </div>

    <div style="margin-top:12px;display:flex;gap:12px;flex-wrap:wrap;">
      <button id="applyBtn" class="primary">Opdater kort</button>
      <button id="resetBtn" class="secondary">Nulstil</button>
      <button id="myposBtn" class="secondary">Min position</button>

      <span id="gpsChip" class="oex-chip">
        <span class="dot"></span>PAUSE
      </span>
    </div>

  </div>
</header>


<div class="map-wrap">
  <div id="map"></div>
</div>


<script>
// ======================================================
// OEX KONFIG
// ======================================================

// ⭐ INDSÆT DIN AZURE MAPS KEY HER ⭐
const AZURE_MAPS_KEY = "D9dGgfb9BY3umCaFfsewjziUirXEz50b9Lhqszcrrq5jc0KiMYSuJQQJ99CBACi5YpzFQJVFAAAgAZMP1WG9";

// ⭐ INDSÆT DIN STOPDATA GEOJSON URL HER ⭐
const OEX_STOPS_BLOB_URL = "https://oexazfilkonto.blob.core.windows.net/gtfs/GTFS.zip";

let map, datasource, routeSource, stopsDs, popup;


// ======================================================
// INIT KORT
// ======================================================
function initMap(){
  map = new atlas.Map("map", {
    authOptions:{
      authType:"subscriptionKey",
      subscriptionKey:AZURE_MAPS_KEY
    },
    center:[10.2039,56.1629],
    zoom:12,
    style:"grayscale_dark"
  });

  map.events.add("ready", () => {

    datasource = new atlas.source.DataSource();
    routeSource = new atlas.source.DataSource();
    stopsDs   = new atlas.source.DataSource();

    map.sources.add(datasource);
    map.sources.add(routeSource);
    map.sources.add(stopsDs);

    // Markører A/B
    map.layers.add(new atlas.layer.BubbleLayer(datasource,null,{
      radius:8,color:"#00B0F8"
    }));
    map.layers.add(new atlas.layer.SymbolLayer(datasource,null,{
      textOptions:{ textField:["get","label"], color:"#fff", size:13, offset:[0,-2] }
    }));

    // Rute-lag
    map.layers.add(new atlas.layer.LineLayer(routeSource,null,{
      strokeColor:"#00B0F8",strokeWidth:4,strokeDashArray:[6,4]
    }));

    // Stops-lag
    const stopsLayer = new atlas.layer.SymbolLayer(stopsDs,null,{
      iconOptions:{ image:"pin-round-darkblue", allowOverlap:true }
    });
    map.layers.add(stopsLayer);

    popup = new atlas.Popup();

    map.events.add("click", stopsLayer, popupStop);

    setupSearch(1);
    setupSearch(2);

    document.getElementById("applyBtn").onclick = updateMap;
    document.getElementById("resetBtn").onclick = resetB;
    document.getElementById("myposBtn").onclick = getMyPos;
  });
}


// ======================================================
// ADRESSESØGNING
// ======================================================
function setupSearch(i){
  const el = document.getElementById("addr"+i);
  const sug = document.getElementById("sug"+i);
  el.addEventListener("input", () => {
    clearTimeout(el._t);
    const q = el.value.trim();
    if(!q){ sug.style.display="none"; return; }
    el._t = setTimeout(() => fetchAddr(i,q), 300);
  });
}

async function fetchAddr(i,q){
  const sug = document.getElementById("sug"+i);
  sug.innerHTML = "";

  const url = 
    `https://atlas.microsoft.com/search/fuzzy/json?api-version=1.0`
    +`&subscription-key=${AZURE_MAPS_KEY}`
    +`&limit=5&language=da-DK&query=${encodeURIComponent(q)}`;

  const r = await fetch(url);
  const j = await r.json();

  (j.results||[]).forEach(r => {
    const d = document.createElement("div");
    d.className="suggestion";
    d.textContent = r.address.freeformAddress;
    d.onclick= ()=>{
      document.getElementById("addr"+i).value = r.address.freeformAddress;
      document.getElementById("lat"+i).value  = r.position.lat;
      document.getElementById("lng"+i).value  = r.position.lon;
      sug.style.display="none";
      updateMap();
    };
    sug.appendChild(d);
  });

  sug.style.display="block";
}


// ======================================================
// STOP-FILTER (BLOB → filtreret)
// ======================================================
function haversine(lat1,lon1,lat2,lon2){
  const R=6371000;
  const dLat=(lat2-lat1)*Math.PI/180;
  const dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2 +
          Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return 2*R*Math.asin(Math.sqrt(a));
}

async function loadStopsFiltered(cLat,cLon,maxDist){
  try{
    const r = await fetch(OEX_STOPS_BLOB_URL);
    const j = await r.json();

    const fc = {type:"FeatureCollection",features:[]};

    for(const f of j.features){
      const [lon,lat] = f.geometry.coordinates;
      if(haversine(cLat,cLon,lat,lon) <= maxDist){
        fc.features.push(f);
      }
    }

    stopsDs.clear();
    stopsDs.add(fc);

  }catch(e){
    console.error("Stopfilter fejl:", e);
  }
}

function loadStopsAlongRoute(coords){
  if(!coords.length) return;
  const mid = coords[Math.floor(coords.length/2)];
  loadStopsFiltered(mid[1], mid[0], 300); // 300m buffer
}

function loadStopsNearMe(lat,lon){
  loadStopsFiltered(lat,lon,1000);
}


// ======================================================
// POPUP PÅ STOP
// ======================================================
function popupStop(e){
  const pos = e.shapes[0].getCoordinates();
  const html = `
    <div style="min-width:200px;color:#fff;">
      <b>Stoppested</b><br>
      Realtid kan kobles på her.
    </div>
  `;
  popup.setOptions({position:pos,content:html});
  popup.open(map);
}


// ======================================================
// RUTE
// ======================================================
async function updateMap(){
  datasource.clear();
  routeSource.clear();

  const lat1 = parseFloat(document.getElementById("lat1").value);
  const lng1 = parseFloat(document.getElementById("lng1").value);
  const lat2 = parseFloat(document.getElementById("lat2").value);
  const lng2 = parseFloat(document.getElementById("lng2").value);

  if(lat1 && lng1)
    datasource.add(new atlas.data.Feature(new atlas.data.Point([lng1,lat1]),{label:"A"}));

  if(lat2 && lng2)
    datasource.add(new atlas.data.Feature(new atlas.data.Point([lng2,lat2]),{label:"B"}));

  if(lat1 && lng1 && lat2 && lng2){
    const url=
      `https://atlas.microsoft.com/route/directions/json?api-version=1.0`
      +`&subscription-key=${AZURE_MAPS_KEY}`
      +`&query=${lat1},${lng1}:${lat2},${lng2}`;

    const r = await fetch(url);
    const j = await r.json();

    const coords = j.routes[0].legs.flatMap(
      leg => leg.points.map(p => [p.longitude,p.latitude])
    );

    routeSource.add(new atlas.data.Feature(new atlas.data.LineString(coords)));

    map.setCamera({
      bounds:atlas.data.BoundingBox.fromLatLngs(coords),
      padding:60
    });

    loadStopsAlongRoute(coords);
  }
}


// ======================================================
// MIN POSITION
// ======================================================
function getMyPos(){
  navigator.geolocation.getCurrentPosition(pos => {
    const lat=pos.coords.latitude;
    const lon=pos.coords.longitude;

    map.setCamera({center:[lon,lat],zoom:15});
    loadStopsNearMe(lat,lon);

    const chip=document.getElementById("gpsChip");
    chip.classList.add("oex-chip-on");
    chip.innerHTML=`<span class="dot"></span>LIVE`;
  });
}


// ======================================================
function resetB(){
  document.getElementById("addr2").value="";
  document.getElementById("lat2").value="";
  document.getElementById("lng2").value="";
  updateMap();
}


// ======================================================
window.addEventListener("DOMContentLoaded", initMap);
</script>

</body>
</html>
