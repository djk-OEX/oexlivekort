<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OEX Kort – Topbar (AutoTrack + Kompas + Pitch + Status)</title>

  <!-- Azure Maps Web SDK v3 (KORREKTE TAGS) -->
  <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css" type="text/css"/>
  <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js"></script>

  <!-- OEX BRANDING -->
  <meta name="color-scheme" content="dark"/>
  <style>
    :root{ --oex-bg:#000; --oex-text:#fff; --oex-accent:#00B0F8; --oex-fig:#363636; }
    html, body{ margin:0; height:100%; background:var(--oex-bg); color:var(--oex-text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ display:flex; flex-direction:column; min-height:100vh; }
    header{ position:sticky; top:0; z-index:40; padding:10px 12px; background:#000; border-bottom:1px solid var(--oex-fig); box-shadow:0 4px 14px rgba(0,0,0,.35); }
    .content{ max-width:1200px; margin:0 auto; }
    .form-grid{ display:grid; grid-template-columns: repeat(2, minmax(240px, 520px)); gap:12px; align-items:start; }
    .card{ border:1px solid var(--oex-fig); border-radius:10px; padding:12px; background:#0b0b0b; position:relative; }
    .card h2{ margin:0 0 10px 0; font-size:14px; font-weight:700; }
    label{ display:block; font-size:12px; margin:6px 0 4px; color:#e8e8e8; }
    input[type="text"], input[type="number"]{ width:100%; max-width:420px; padding:8px 10px; border-radius:8px; border:1px solid var(--oex-fig); background:#121212; color:#oex-text; outline:none; }
    input::placeholder{ color:#9e9e9e; }
    .suggestions{ position:absolute; left:12px; right:12px; background:#0f0f10; border:1px solid var(--oex-fig); border-top:none; border-radius:0 0 8px 8px; max-height:220px; overflow:auto; z-index:50; box-shadow: 0 6px 18px rgba(0,0,0,.45); }
    #map{ flex:1 1 auto; min-height:0; height:100%; }
  </style>
</head>

<body>

      <div class="form-grid">

        <div class="card" id="card1">
          <label for="addr1">Adresse (autofind)</label>
          <input id="addr1" type="text" placeholder="Skriv adresse … (fx 'Gunnar Clausens Vej 82, 8260')" autocomplete="street-address" />
          <div id="sug1" class="suggestions" style="display:none;"></div>
          <input id="name1" type="text" value="OEX SPOR" style="display:none" />
          <input id="lat1" type="number" step="any" placeholder="56.1629" style="display:none" />
          <input id="lng1" type="number" step="any" placeholder="10.2039" style="display:none" />
        </div>

        <!-- PUNKT B -->

          <input id="lng2" type="number" step="any" placeholder="(valgfri)" style="display:none" />
        </div>

        <div class="toolbar">
          <div>
            <button id="oex-zoom-in" class="oex-btn">+</button>
            <button id="oex-zoom-out" class="oex-btn">–</button>
          </div>
          <button id="oex-mypos" class="oex-btn" style="font-size:24px;">•</button>
          <div>
            <button id="applyBtn">Opdater kort</button>

            <button class="secondary" id="autotrackBtn">Auto-spor: OFF</button>
            <span id="oex-gps-status" class="oex-chip oex-chip-off"><span class="dot"></span>PAUSE</span>
            <button class="secondary" id="shareBtn">Del</button>
            <button class="secondary" id="viewToggleBtn">VISNING: DARK</button>
          </div>
        </div>

      </div>
    </div>
  </header>

  <div class="map-wrap">
    <div id="map"></div>
  </div>

const OEX_BLUE = "#00B0F8";

// ===== Utils =====
function isFiniteNumber(n){ return typeof n === 'number' && Number.isFinite(n); }
function isValidLatLon(lat,lng){ return isFiniteNumber(lat) && isFiniteNumber(lng) && lat>=-90 && lat<=90 && lng>=-180 && lng<=180; }
function readNum(id){ const el = document.getElementById(id); const v = el.value.trim(); const n = Number(v); return Number.isFinite(n)?n:NaN; }

// ========== PATCH DEL 1: loadNearbyStops ==========
async function loadNearbyStops(){
    if(!stopsDs) return;

    const lat = readNum("lat1");
    const lng = readNum("lng1");

    if(!isValidLatLon(lat, lng)) return;

    stopsDs.clear();

    try{
        const radius = 300; // meter
        const url = `/api/stops?lat=${lat}&lon=${lng}&radius=${radius}&limit=50`;
        const r = await fetch(url);
        if(!r.ok) throw 0;

        const j = await r.json();
        const list = j.data || [];

        const feats = list.map(s =>
            new atlas.data.Feature(
                new atlas.data.Point([s.lon, s.lat]),
                { stopId: s.stopId, stopName: s.stopName }
            )
        );

        stopsDs.add(new atlas.data.FeatureCollection(feats));
    }catch(e){
        console.error("loadNearbyStops fejl:", e);
    }
}

// ===== Azure Maps setup =====
let map, datasource, routeSource, stopsDs;

function initMap(){
  map = new atlas.Map("map", {
    authOptions:{ authType:"subscriptionKey", subscriptionKey:AZURE_MAPS_KEY },
    style:"grayscale_dark",
    center:[10.2039,56.1629],
    zoom:12
  });

  map.events.add("ready", async () => {

    datasource = new atlas.source.DataSource();
    map.sources.add(datasource);

    let bubbleLayer = new atlas.layer.BubbleLayer(datasource, null,{
        radius:8, color:OEX_BLUE
    });
    let symbolLayer = new atlas.layer.SymbolLayer(datasource, null,{
        textOptions:{ textField:["get","label"], color:"#fff", offset:[0,-2], size:13 }
    });

    map.layers.add([bubbleLayer, symbolLayer],"labels");

    // Rutelag
    routeSource = new atlas.source.DataSource();
    map.sources.add(routeSource);
    let routeLayer = new atlas.layer.LineLayer(routeSource, null,{
        strokeColor:OEX_BLUE,
        strokeWidth:4,
        strokeDashArray:[6,4]
    });
    map.layers.add(routeLayer,"labels");

    // ========== PATCH: STOPPESTEDER (FJERNER WFS) ==========
    stopsDs = new atlas.source.DataSource();
    map.sources.add(stopsDs);

    let stopsLayer = new atlas.layer.SymbolLayer(stopsDs, null,{
        iconOptions:{ image:"pin-round-darkblue", allowOverlap:true }
    });
    map.layers.add(stopsLayer,"labels");

    // Popup ved klik
    let popup = new atlas.Popup();
    map.events.add("click", stopsLayer, async (e)=>{
      ...
      // (Popup logikken fortsætter som i din fil – uændret)
      ...
    });

    document.getElementById("applyBtn").addEventListener("click", ()=> updateMapFromForm(false));
    document.getElementById("resetBtn").addEventListener("click", resetOptional);

    await updateMapFromForm(true);
  });
}

// ===== Tegn markører + rute =====
async function updateMapFromForm(keepZoom=false){
    if(!datasource) return;
    datasource.clear();

    const lat1 = readNum("lat1"), lng1 = readNum("lng1");
    const lat2 = readNum("lat2"), lng2 = readNum("lng2");

    if(isValidLatLon(lat1,lng1)){
        datasource.add(new atlas.data.Feature(new atlas.data.Point([lng1,lat1]),{label:"A"}));
    }
    if(isValidLatLon(lat2,lng2)){
        datasource.add(new atlas.data.Feature(new atlas.data.Point([lng2,lat2]),{label:"B"}));
    }

    await drawRouteIfReady();

    // ========== PATCH DEL 2: hent stoppesteder tæt på punkt A ==========
    await loadNearbyStops();
}

// ===== Reset =====
function resetOptional(){
    ["addr2","name2","lat2","lng2"].forEach(id=>{
        document.getElementById(id).value="";
    });
    updateMapFromForm(false);

// Boot
window.addEventListener("DOMContentLoaded", initMap);
</script>

</html>
