<!doctype html>
<html lang="da">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>OEX Kort – Topbar (AutoTrack + Kompas + Pitch + Status)</title>
  
  <!-- Azure Maps Web SDK v3 -->
  <link rel="stylesheet" href="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.css" type="text/css"/>
  <script src="https://atlas.microsoft.com/sdk/javascript/mapcontrol/3/atlas.min.js"></script>

  <!-- OEX BRANDING -->
  <meta name="color-scheme" content="dark"/>
  <style>

/* OEX PATCH INSERTED */
.oex-btn, button, .actions button, svg.map-icon,
label,
input[type='text'], input[type='number'],
input::placeholder,
#oex-transit-panel {
  forced-color-adjust: none !important;
}
label { color:#FFFFFF !important; }
input::placeholder { color:#00B0F8 !important; }
input[type='text'], input[type='number'] { border-color:#363636 !important; }


    :root{ --oex-bg:#000000; --oex-text:#ffffff; --oex-accent:#00B0F8; --oex-fig:#363636; }
    html, body{ margin:0; height:100%; background:var(--oex-bg); color:var(--oex-text); font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; }
    body{ display:flex; flex-direction:column; min-height:100vh; }
    header{ position:sticky; top:0; z-index:40; padding:10px 12px; background:#000; border-bottom:1px solid var(--oex-fig); box-shadow:0 4px 14px rgba(0,0,0,.35); }
    .content{ max-width:1200px; margin:0 auto; }
    .form-grid{ display:grid; grid-template-columns: repeat(2, minmax(240px, 520px)); gap:12px; align-items:start; }
    .card{ border:1px solid var(--oex-fig); border-radius:10px; padding:12px; background:#0b0b0b; position:relative; }
    .card h2{ margin:0 0 10px 0; font-size:14px; font-weight:700; }
    label{ display:block; font-size:12px; margin:6px 0 4px; color:#e8e8e8; }
    input[type="text"], input[type="number"]{ width:100%; max-width:420px; padding:8px 10px; border-radius:8px; border:1px solid var(--oex-fig); background:#121212; color:var(--oex-text); outline:none; }
    input::placeholder{ color:var(--oex-accent); }
    .suggestions{ position:absolute; left:12px; right:12px; background:#0f0f10; border:1px solid var(--oex-fig); border-top:none; border-radius:0 0 8px 8px; max-height:220px; overflow:auto; z-index:50; box-shadow: 0 6px 18px rgba(0,0,0,.45); }
    .suggestion{ padding:8px 10px; cursor:pointer; border-top:1px solid #222; font-size:13px; color:#eaeaea; }
    .suggestion:hover{ background:#11161a; color:#fff; }
    .hint{ font-size:11px; color:#bbbbbb; }
    .logo{ height: 48px; display:block; margin:2px 0 6px 0; }
    .toolbar{ display:flex; gap:10px; align-items:center; flex-wrap:wrap; margin-top:8px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
    button{ background:var(--oex-accent); color:#00131B; border:none; padding:10px 14px; border-radius:8px; font-weight:700; cursor:pointer; }
    button.secondary{ background:transparent; color:var(--oex-accent); border:2px solid var(--oex-fig); }
    .oex-zoom-wrap{ display:flex; gap:8px; }
    .oex-btn{ width:40px; height:40px; border-radius:10px; border:2px solid var(--oex-fig); background:#000000; color:var(--oex-accent); font-weight:700; font-size:20px; line-height:1; cursor:pointer; user-select:none; box-shadow:0 2px 8px rgba(0,0,0,.35); display:flex; align-items:center; justify-content:center; text-align:center; } 
    .oex-btn:active{ transform:scale(0.98);} 
    .oex-btn:focus{ outline:2px solid var(--oex-accent); outline-offset:2px;} 
    .azure-map-control a{ color:var(--oex-accent) !important; } 
    #map{ flex:1 1 auto; min-height:0; height:100%; } 
    .map-wrap{ position:relative; flex:1 1 auto; min-height:0; } 
    @media (max-width: 820px){ .form-grid{ grid-template-columns: 1fr; } } 
    .oex-chip{ display:inline-flex; align-items:center; gap:8px; padding:6px 10px; border-radius:9999px; border:1px solid var(--oex-fig); background:#0b0b0b; color:#fff; font-weight:700; font-size:12px; } 
    .oex-chip .dot{ width:8px; height:8px; border-radius:50%; background:var(--oex-fig); display:inline-block; } 
    .oex-chip-on{ border-color: var(--oex-accent); } 
    .oex-chip-on .dot{ background: var(--oex-accent); } 
    

    @media (forced-colors: active) {
      :root{ --oex-accent:#00B0F8 !important; --oex-fig:#363636 !important; }
      html, body{ background:#000000 !important; color:#ffffff !important; }
      header{ background:#000 !important; border-bottom-color:#363636 !important; }
      .card{ border-color:#363636 !important; background:#0b0b0b !important; }
      label{ color:#e8e8e8 !important; }
      input[type="text"], input[type="number"]{ border-color:#363636 !important; background:#121212 !important; color:#ffffff !important; }
      input::placeholder{ color:#00B0F8 !important; }
      .suggestions{ background:#0f0f10 !important; border-color:#363636 !important; }
      .suggestion{ border-top-color:#222 !important; color:#eaeaea !important; }
      .suggestion:hover{ background:#11161a !important; color:#fff !important; }
      .hint{ color:#bbbbbb !important; }
      button{ background:#00B0F8 !important; color:#00131B !important; }
      button.secondary{ background:transparent !important; color:#00B0F8 !important; border-color:#363636 !important; }
      .oex-btn{ border-color:#363636 !important; background:#000000 !important; color:#00B0F8 !important; }
      .oex-btn:focus{ outline-color:#00B0F8 !important; }
      
      .oex-chip{ border-color:#363636 !important; background:#0b0b0b !important; color:#fff !important; }
      .oex-chip .dot{ background:#363636 !important; }
      .oex-chip-on{ border-color:#00B0F8 !important; }
      .oex-chip-on .dot{ background:#00B0F8 !important; }
      #oex-transit-panel{ border-color:#00B0F8 !important; background:#000000 !important; color:#ffffff !important; }
    }
  
/* OEX MAP ICON FINAL 24PX */
svg.map-icon {
  width:24px !important;
  height:24px !important;
  min-width:24px !important;
  min-height:24px !important;
  max-width:24px !important;
  max-height:24px !important;
  stroke:#00B0F8 !important;
  stroke-width:2 !important;
  fill:none !important;
  stroke-linecap:round !important;
  stroke-linejoin:round !important;
}

/* OEX TRANSIT PANEL */
#oex-transit-panel {
  position:absolute;
  bottom:18px;
  left:18px;
  transform:none;
  z-index:30;
  background:#000000;
  border:2px solid #00B0F8;
  border-radius:10px;
  padding:10px 16px;
  color:#ffffff;
  font-size:13px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  max-width:min(420px, 90vw);
  width:max-content;
  box-shadow:0 4px 18px rgba(0,176,248,.25);
  pointer-events:auto;
}
#oex-transit-panel .oex-tp-title {
  font-weight:700;
  font-size:13px;
  color:#00B0F8;
  margin-bottom:6px;
  display:flex;
  align-items:center;
  gap:6px;
}
#oex-transit-panel .oex-tp-row {
  margin:3px 0;
  color:#e8e8e8;
}
#oex-transit-panel .oex-tp-row strong { color:#ffffff; }
#oex-transit-panel .oex-tp-link {
  display:inline-block;
  margin-top:8px;
  color:#00B0F8;
  font-weight:700;
  text-decoration:none;
  border:1px solid #00B0F8;
  border-radius:6px;
  padding:4px 10px;
  font-size:12px;
}
#oex-transit-panel .oex-tp-link:hover { background:#00B0F8; color:#000; }
#oex-transit-panel .oex-tp-deps { margin-top:4px; margin-bottom:2px; }
#oex-transit-panel .oex-tp-dep { display:flex; align-items:center; gap:6px; margin:2px 0; font-size:12px; }
#oex-transit-panel .oex-tp-dep-line { background:#00B0F8; color:#000; border-radius:3px; padding:1px 5px; font-weight:700; min-width:32px; text-align:center; flex-shrink:0; }
#oex-transit-panel .oex-tp-dep-dir { flex:1; color:#e0e0e0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
#oex-transit-panel .oex-tp-dep-time { color:#ffffff; font-weight:700; white-space:nowrap; }
#oex-transit-panel .oex-tp-dep-rt { color:#00e676; font-size:10px; margin-left:2px; }

/* BUS STOP MARKER POPUP */
.oex-busstop-popup {
  position:absolute;
  z-index:50;
  background:#000000;
  border:2px solid #00B0F8;
  border-radius:8px;
  padding:8px 12px;
  color:#ffffff;
  font-size:12px;
  font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
  white-space:nowrap;
  box-shadow:0 4px 16px rgba(0,176,248,.35);
  pointer-events:none;
  transform:translate(-50%, calc(-100% - 14px));
}
.oex-busstop-popup .oex-bp-title { font-weight:700; color:#00B0F8; margin-bottom:5px; font-size:13px; }
.oex-busstop-popup .oex-bp-dep { display:flex; align-items:center; gap:5px; margin:2px 0; }
.oex-busstop-popup .oex-bp-line { background:#00B0F8; color:#000; border-radius:3px; padding:1px 5px; font-weight:700; min-width:28px; text-align:center; flex-shrink:0; }
.oex-busstop-popup .oex-bp-time { color:#ffffff; font-weight:700; }
.oex-busstop-popup .oex-bp-none { color:#bbbbbb; font-size:11px; }
.oex-busstop-popup::after {
  content:'';
  position:absolute;
  bottom:-9px;
  left:50%;
  transform:translateX(-50%);
  border:5px solid transparent;
  border-top-color:#00B0F8;
  border-bottom:0;
}

.oex-routestop-pin {
  width:12px; height:12px;
  background:#000;
  border:2px solid #00B0F8;
  border-radius:50%;
  cursor:pointer;
  box-shadow:0 0 6px rgba(0,176,248,.6);
}

</style>
</head>
<body>
  <header>
    <div class="content">
      <img class="logo" alt="OEX" src="https://oexazfilkonto.blob.core.windows.net/oexazfillager/OEXADMAZSTORTILPASSET.png" />
      <div class="form-grid">
        <!-- PUNKT A -->
        <div class="card" id="card1">
          <h2></h2>
          <label for="addr1">Adresse (autofind)</label>
          <input id="addr1" type="text" placeholder="Skriv adresse … (fx 'Gunnar Clausens Vej 82, 8260')" autocomplete="street-address" />
          <div id="sug1" class="suggestions" style="display:none;"></div>
          <label for="name1" style="display:none">Navn / label</label>
          <input id="name1" type="text" value="OEX SPOR" style="display:none" />
          <label for="lat1" style="display:none">Breddegrad (lat)</label>
          <input id="lat1" type="number" step="any" placeholder="56.1629" style="display:none" />
          <label for="lng1" style="display:none">Længdegrad (lng)</label>
          <input id="lng1" type="number" step="any" placeholder="10.2039" style="display:none" />
          <div class="hint" id="hint1"></div>
        </div>
        <!-- PUNKT B -->
        <div class="card" id="card2">
          <h2></h2>
          <label for="addr2">Adresse (autofind)</label>
          <input id="addr2" type="text" placeholder="Skriv adresse …" autocomplete="street-address" />
          <div id="sug2" class="suggestions" style="display:none;"></div>
          <label for="name2" style="display:none">Navn / label</label>
          <input id="name2" type="text" placeholder="OEX DESTINATION" style="display:none" />
          <label for="lat2" style="display:none">Breddegrad (lat)</label>
          <input id="lat2" type="number" step="any" placeholder="(valgfri)" style="display:none" />
          <label for="lng2" style="display:none">Længdegrad (lng)</label>
          <input id="lng2" type="number" step="any" placeholder="(valgfri)" style="display:none" />
          <div class="hint" id="hint2"></div>
        </div>

        <div class="toolbar">
          <div class="oex-zoom-wrap" aria-label="Zoom-kontrol">
            <button id="oex-zoom-in" class="oex-btn" aria-label="Zoom ind" title="Zoom ind (+)">+</button>
            <button id="oex-zoom-out" class="oex-btn" aria-label="Zoom ud" title="Zoom ud (–)">–</button>
            <button id="oex-mypos" class="oex-btn" aria-label="Min position" title="Min position">
              <svg class="map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="6"/>
                <line x1="12" y1="2" x2="12" y2="6"/>
                <line x1="12" y1="18" x2="12" y2="22"/>
                <line x1="2" y1="12" x2="6" y2="12"/>
                <line x1="18" y1="12" x2="22" y2="12"/>
              </svg>
            </button>
            <button id="viewToggleBtn" class="oex-btn" aria-label="Skift visning" title="Skift visning (Dark / 3D / Virkelighed)">
              <svg class="map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 3L3 6v15l6-3 6 3 6-3V3l-6 3-6-3z"/>
                <path d="M9 3v15M15 6v15"/>
              </svg>
            </button>
            <button class="oex-btn" id="travelModeBtn" title="Skift mellem bilrute og gårute">
              <svg class="map-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <rect x="2" y="9" width="20" height="9" rx="2"/>
                <path d="M5 9l2-4h10l2 4"/>
                <circle cx="7" cy="18" r="2"/><circle cx="17" cy="18" r="2"/>
              </svg>
            </button>
          </div>
          <div class="actions">
            <button class="secondary" id="resetBtn" title="Nulstil felter">Nulstil</button>
            <button class="secondary" id="autotrackBtn" title="Start/stop auto-sporing">Auto-spor: OFF</button>
            <span id="oex-gps-status" class="oex-chip oex-chip-off" aria-live="polite" title="GPS status"><span class="dot" aria-hidden="true"></span>PAUSE</span>
            <button class="secondary" id="shareBtn" title="Del visning">Del</button>
          </div>
        </div>
      </div>
    </div>
  </header>

  <div class="map-wrap">
    <div id="map" role="region" aria-label="Kort med to markører (A og B) og rute"></div>
  </div>

  <script>
  // ===== Konfiguration =====
  // TODO: Paste your Azure Maps subscription key below.
  const AZURE_MAPS_KEY = 'D9dGgfb9BY3umCaFfsewjziUirXEz50b9Lhqszcrrq5jc0KiMYSuJQQJ99CBACi5YpzFQJVFAAAgAZMP1WG9';
  const OEX_BLUE = "#00B0F8";

  // ===== Utils (validering/guards) =====
  function isFiniteNumber(n){ return typeof n === 'number' && Number.isFinite(n); }
  function isValidLatLon(lat,lng){ return isFiniteNumber(lat) && isFiniteNumber(lng) && lat >= -90 && lat <= 90 && lng >= -180 && lng <= 180; }
  function safeSetCenter(lat,lng,zoom=11.5,duration=500){ try{ if(isValidLatLon(lat,lng)) map.setCamera({ center:[lng,lat], zoom, duration }); }catch(e){} }
  function setStatusChip(text, live){ const el = document.getElementById('oex-gps-status'); if(!el) return; el.classList.toggle('oex-chip-on', !!live); el.classList.toggle('oex-chip-off', !live); el.innerHTML = '<span class="dot" aria-hidden="true"></span>' + text; }

  // ===== Azure Maps setup =====
  let map, datasource, bubbleLayer, symbolLayer, routeSource, routeLayer, routeLabelMarker;
  let currentTravelMode = 'car';
  let busMarkers = [];
  let _busStopPopup = null;
  const timers = {1:null, 2:null};
  const JYLLAND_BBOX = [8.0, 54.8, 10.95, 57.75];
  function zoomToJylland(duration=300){ try{ if(map) map.setCamera({ bounds: JYLLAND_BBOX, padding:60, duration }); }catch(e){} }
  function safeResize(){ try{ if(map) map.resize(); }catch(e){} }

  // ===== URL <-> STATE =====
  const OEX_DEFAULT_VIEW = { lat: 56.1629, lng: 10.2039, z: 12, b: 0, p: 0 };

  // --- OEX VIEW MODE (dark | 3d | reality) ---
  let _oexView = 'dark';
  function oexApplyView(view){
    _oexView = (view==='3d' || view==='reality') ? view : 'dark';
    try{
      if(_oexView==='reality'){
        map.setStyle({ style: 'satellite_road_labels' });
        const cam = map.getCamera();
        map.setCamera({ pitch: 0, bearing: cam.bearing||0 });
      } else if(_oexView==='3d'){
        map.setStyle({ style: 'grayscale_dark' });
        const cam = map.getCamera();
        const targetZoom = (cam.zoom && cam.zoom < 17) ? 17 : (cam.zoom||17);
        map.setCamera({ zoom: targetZoom, pitch: 60, bearing: cam.bearing||0, duration: 250 });
      } else {
        map.setStyle({ style: 'grayscale_dark' });
        const cam = map.getCamera();
        map.setCamera({ pitch: 0, bearing: cam.bearing||0 });
      }
    }catch(e){ console.warn('oexApplyView error', e); }
  }

  function oexGetUrlState() {
    const u = new URL(window.location.href);
    const o = {
      center: u.searchParams.get('center'),
      zoom: parseFloat(u.searchParams.get('zoom')),
      bearing: parseFloat(u.searchParams.get('bearing')),
      pitch: parseFloat(u.searchParams.get('pitch')),
      pos1: u.searchParams.get('pos1'),
      pos2: u.searchParams.get('pos2'),
      addr1: u.searchParams.get('addr1'),
      addr2: u.searchParams.get('addr2'),
      live: u.searchParams.get('live'),
      view: u.searchParams.get('view')
    };

    const out = {
      lat: OEX_DEFAULT_VIEW.lat,
      lng: OEX_DEFAULT_VIEW.lng,
      z: isFinite(o.zoom) ? o.zoom : OEX_DEFAULT_VIEW.z,
      b: isFinite(o.bearing) ? o.bearing : OEX_DEFAULT_VIEW.b,
      p: isFinite(o.pitch) ? o.pitch : OEX_DEFAULT_VIEW.p,
      pos1: null,
      pos2: null,
      addr1: o.addr1 || '',
      addr2: o.addr2 || '',
      live: o.live === '1',
      view: (o.view==='3d' || o.view==='reality') ? o.view : 'dark'
    };

    if (o.center && o.center.includes(',')) {
      const [latStr, lngStr] = o.center.split(',');
      const lat = parseFloat(latStr), lng = parseFloat(lngStr);
      if (isValidLatLon(lat, lng)) { out.lat = lat; out.lng = lng; }
    }

    function parsePos(v) {
      if (!v || !v.includes(',')) return null;
      const [la, ln] = v.split(',');
      const lat = parseFloat(la), lng = parseFloat(ln);
      return isValidLatLon(lat, lng) ? { lat, lng } : null;
    }
    out.pos1 = parsePos(o.pos1);
    out.pos2 = parsePos(o.pos2);

    return out;
  }

  async function oexApplyUrlStateOnLoad(){
    const s = oexGetUrlState();
    let applied = false;

    if (s.addr1) { document.getElementById('addr1').value = s.addr1; applied = true; }
    if (s.addr2) { document.getElementById('addr2').value = s.addr2; applied = true; }
    if (s.pos1) {
      document.getElementById('lat1').value = s.pos1.lat.toFixed(6);
      document.getElementById('lng1').value = s.pos1.lng.toFixed(6);
      if (!document.getElementById('name1').value.trim()) document.getElementById('name1').value = 'PUNKT A';
      applied = true;
    }
    if (s.pos2) {
      document.getElementById('lat2').value = s.pos2.lat.toFixed(6);
      document.getElementById('lng2').value = s.pos2.lng.toFixed(6);
      if (!document.getElementById('name2').value.trim()) document.getElementById('name2').value = 'PUNKT B';
      applied = true;
    }

    await updateMapFromForm(true);

    if (map) {
      map.setCamera({ center:[s.lng, s.lat], zoom:s.z, bearing:s.b, pitch:s.p, duration:0 });
      applied = applied || true;
    }

    setStatusChip(s.live ? 'LIVE • GPS' : 'PAUSE', s.live);
    try{ oexApplyView(s.view); }catch(_){ }
    return applied;
  }

  let oexUrlWriteTimer = null;
  function oexSyncUrlFromCamera(){
    try {
      const cam = map.getCamera();
      const u = new URL(window.location.href);
      u.searchParams.set('center', `${cam.center[1].toFixed(6)},${cam.center[0].toFixed(6)}`);
      u.searchParams.set('zoom',   cam.zoom.toFixed(2));
      u.searchParams.set('bearing', (cam.bearing || 0).toFixed(1));
      u.searchParams.set('pitch', (cam.pitch || 0).toFixed(1));
      u.searchParams.set('view', _oexView);
      clearTimeout(oexUrlWriteTimer);
      oexUrlWriteTimer = setTimeout(() => { history.replaceState(null, '', u.toString()); }, 120);
    } catch(_) {}
  }

  window.addEventListener('popstate', () => {
    const s = oexGetUrlState();
    if (!map) return;
    map.setCamera({ center:[s.lng, s.lat], zoom:s.z, bearing:s.b, pitch:s.p, duration:0 });
    if (s.pos1) { document.getElementById('lat1').value = s.pos1.lat.toFixed(6); document.getElementById('lng1').value = s.pos1.lng.toFixed(6); }
    if (s.pos2) { document.getElementById('lat2').value = s.pos2.lat.toFixed(6); document.getElementById('lng2').value = s.pos2.lng.toFixed(6); }
    try{ oexApplyView(s.view); }catch(_){ }
    updateMapFromForm(true);
  });

  // ===== Init kort =====
  function initMap(){
    map = new atlas.Map("map", {
      authOptions: { authType: "subscriptionKey", subscriptionKey: AZURE_MAPS_KEY },
      style: "grayscale_dark",
      center: [10.2039, 56.1629],
      zoom: 12,
      autoResize: true
    });

    map.events.add("ready", async () => {
      datasource = new atlas.source.DataSource(); map.sources.add(datasource);
      bubbleLayer = new atlas.layer.BubbleLayer(datasource, null, { radius: 8, color: OEX_BLUE, opacity: 1, strokeWidth: 0, strokeOpacity: 0 });
      symbolLayer = new atlas.layer.SymbolLayer(datasource, null, {
        textOptions: { textField: ["coalesce", ["get","label"], ["get","title"]], color: "#FFFFFF", offset: [0,-2], size: 13 },
        iconOptions: { image: "none" }
      });
      map.layers.add([bubbleLayer, symbolLayer], "labels");

      routeSource = new atlas.source.DataSource(); map.sources.add(routeSource);
      routeLayer = new atlas.layer.LineLayer(routeSource, null, { strokeColor: OEX_BLUE, strokeWidth: 4, lineJoin: "round", lineCap: "round", opacity: 0.85, strokeDashArray: [6,4] });
      map.layers.add(routeLayer, "labels");

  // ===== Adresse-søgning =====
  function onAddressInput(idx){ clearTimeout(timers[idx]); const q = (document.getElementById("addr"+idx).value || "").trim(); if (!q) { showSuggestions(idx, []); return; } timers[idx] = setTimeout(()=> fetchSuggestions(idx, q), 450); }
  function triggerSearch(idx){ const q = (document.getElementById("addr"+idx).value || "").trim(); if (q) fetchSuggestions(idx, q, true); }
  async function fetchSuggestions(idx, query, chooseFirstIfAny=false){
    try{
      setHint(idx, "Søger…");
      const url = "https://atlas.microsoft.com/search/fuzzy/json"+
        "?api-version=1.0&language=da-DK&limit=5"+
        "&subscription-key=" + encodeURIComponent(AZURE_MAPS_KEY) +
        "&query=" + encodeURIComponent(query);
      const res = await fetch(url, { credentials:"omit" });
      if(!res.ok) throw new Error("HTTP " + res.status);
      const data = await res.json();
      const results = (data && data.results) ? data.results : [];
      setHint(idx, results.length ? "" : "Ingen match.");
      if (chooseFirstIfAny && results.length) { selectSuggestion(idx, results[0]); showSuggestions(idx, []); return; }
      const suggestions = results.map(r => ({ title: r.address && r.address.freeformAddress ? r.address.freeformAddress : (r.address && r.address.country) || "Ukendt", lat: r.position && r.position.lat, lon: r.position && r.position.lon }))
        .filter(s => isValidLatLon(s.lat, s.lon));
      showSuggestions(idx, suggestions);
    }catch(err){ console.error("Azure Maps search fejl:", err); setHint(idx, "Fejl ved søgning (tjek key/CORS)."); showSuggestions(idx, []); }

  function formatRouteLabel(meters, seconds) {
    const km = (meters / 1000).toFixed(0);
    if (seconds < 3600) {
      return km + ' km | ' + Math.round(seconds / 60) + ' min';
    } else {
      const h = Math.floor(seconds / 3600);
      const m = Math.round((seconds % 3600) / 60);
      return km + ' km | ' + h + (m > 0 ? ' t ' + m + ' min' : ' t');
    }
  }

  function routeMidpoint(coords) {
    let total = 0, dists = [];
    for (let i = 1; i < coords.length; i++) {
      const dx = coords[i][0] - coords[i-1][0], dy = coords[i][1] - coords[i-1][1];
      const segLen = Math.sqrt(dx*dx + dy*dy);
      dists.push(segLen); total += segLen;
    }
    let half = total / 2, acc = 0;
    for (let i = 0; i < dists.length; i++) {
      acc += dists[i];
      if (acc >= half) {
        const interpolationRatio = (acc - half) / dists[i];
        const startPoint = coords[i], endPoint = coords[i+1];
        return [startPoint[0] + (endPoint[0]-startPoint[0])*(1-interpolationRatio), startPoint[1] + (endPoint[1]-startPoint[1])*(1-interpolationRatio)];
      }
    }
    return coords[Math.floor(coords.length / 2)];
  }

  async function drawRouteIfReady(){
    if (!routeSource) return; routeSource.clear(); if (routeLabelMarker) { map.markers.remove(routeLabelMarker); routeLabelMarker = null; }
    if (currentTravelMode === 'bus') { await findAndShowTransit(); return; }
    clearBusDisplay();
    const lat1 = readNum("lat1"), lng1 = readNum("lng1"), lat2 = readNum("lat2"), lng2 = readNum("lng2");
    if(!(isValidLatLon(lat1,lng1) && isValidLatLon(lat2,lng2))) return;
    try{
      const url = "https://atlas.microsoft.com/route/directions/json"+
        "?api-version=1.0"+
        "&travelMode="+encodeURIComponent(currentTravelMode)+
        "&subscription-key="+encodeURIComponent(AZURE_MAPS_KEY)+
        "&query="+encodeURIComponent(`${lat1},${lng1}:${lat2},${lng2}`);
      const res = await fetch(url, { credentials: 'omit' });
      if(!res.ok) throw new Error('HTTP '+res.status);
      const data = await res.json();
      const route = (((data||{}).routes||[])[0]||{});
      let coords = [];
      const legs = route.legs || [];
      legs.forEach(leg=>{ (leg.points||[]).forEach(p=>{ if(isValidLatLon(p.latitude, p.longitude)){ coords.push([p.longitude,p.latitude]); } }); });
      if(coords.length<2) return;
      routeSource.add(new atlas.data.Feature(new atlas.data.LineString(coords)));
      const summary = route.summary || {};
      if (summary.lengthInMeters && summary.travelTimeInSeconds) {
        const label = formatRouteLabel(summary.lengthInMeters, summary.travelTimeInSeconds);
        const mid = routeMidpoint(coords);
        if (routeLabelMarker) map.markers.remove(routeLabelMarker);
        routeLabelMarker = new atlas.HtmlMarker({
          position: mid,
          htmlContent: '<div style="background:#000000;color:#ffffff;padding:4px 10px;border-radius:4px;border:2px solid #ffffff;font-size:13px;font-weight:bold;white-space:nowrap;font-family:sans-serif;">' + label + '</div>'
        });
        map.markers.add(routeLabelMarker);
      }
      try { map.setCamera({ bounds: atlas.data.BoundingBox.fromLatLngs(coords), padding: 60, duration: 500 }); } catch(e) {}
      setTimeout(safeResize, 50);
    }catch(e){ console.error('Azure Maps route fejl:', e); }
  }

  function _haversineDist(lat1, lng1, lat2, lng2){
    const R = 6371000;
    const toRad = x => x * Math.PI / 180;
    const dLat = toRad(lat2 - lat1), dLng = toRad(lng2 - lng1);
    const a = Math.sin(dLat/2)*Math.sin(dLat/2) +
              Math.cos(toRad(lat1))*Math.cos(toRad(lat2))*Math.sin(dLng/2)*Math.sin(dLng/2);
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  // ── GTFS local stop lookup ──────────────────────────────────────────────────
  let _gtfsStops = null;
  let _gtfsStopsLoading = null;
  let _gtfsRouteLookup = null;      // departure route_id → route_short_name (via trips_by_id + routes)
  let _gtfsRoutesLoading = null;
  let _depsCacheKey = null;         // currently cached departure slot key
  let _depsCacheData = null;        // currently cached departure file data
  let _gtfsStopMap = null;          // stop_id → stop object (built lazily)

  async function loadGtfsStops(){
    if (_gtfsStops) return _gtfsStops;
    if (_gtfsStopsLoading) return _gtfsStopsLoading;
    _gtfsStopsLoading = fetch('data/stops.json')
      .then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); })
      .then(data => { _gtfsStops = Array.isArray(data) ? data : []; _gtfsStopsLoading = null; return _gtfsStops; })
      .catch(e => { console.warn('loadGtfsStops fejl:', e); _gtfsStops = []; _gtfsStopsLoading = null; return _gtfsStops; });
    return _gtfsStopsLoading;
  }

  async function loadGtfsRoutes(){
    if (_gtfsRouteLookup) return _gtfsRouteLookup;
    if (_gtfsRoutesLoading) return _gtfsRoutesLoading;
    _gtfsRoutesLoading = Promise.all([
      fetch('data/routes.json').then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); }),
      fetch('data/trips_by_id.json').then(r => { if (!r.ok) throw new Error('HTTP '+r.status); return r.json(); }).catch(() => ({}))
    ])
      .then(([routesData, tripsData]) => {
        // Build internal route_id → short_name from routes.json
        const routeMap = {};
        if (Array.isArray(routesData)){
          // Array schema: [{route_id, route_short_name, route_long_name}]
          routesData.forEach(r => { if (r.route_id && r.route_short_name) routeMap[r.route_id] = r.route_short_name; });
        } else if (routesData && typeof routesData === 'object'){
          Object.entries(routesData).forEach(([k, v]) => { routeMap[k] = typeof v === 'string' ? v : k; });
        }
        // Build departure route_id → short_name using trips_by_id as bridge
        const lookup = {};
        if (tripsData && typeof tripsData === 'object' && !Array.isArray(tripsData)){
          Object.entries(tripsData).forEach(([depRouteId, internalRouteId]) => {
            const shortName = routeMap[internalRouteId];
            if (shortName) lookup[depRouteId] = shortName;
          });
        }
        // Also add direct entries from routeMap as fallback (only if not already mapped via trips_by_id)
        Object.entries(routeMap).forEach(([k, v]) => { if (!(k in lookup)) lookup[k] = v; });
        _gtfsRouteLookup = lookup;
        _gtfsRoutesLoading = null;
        return _gtfsRouteLookup;
      })
      .catch(e => { console.warn('loadGtfsRoutes fejl:', e); _gtfsRouteLookup = {}; _gtfsRoutesLoading = null; return _gtfsRouteLookup; });
    return _gtfsRoutesLoading;
  }

  function _getDepartureSlotKey(){
    const now = new Date();
    let h = now.getHours();
    const m = now.getMinutes();
    // GTFS allows hours > 23 for after-midnight service
    if (h < 4) h += 24;
    const slotMin = Math.floor(m / 5) * 5;
    return String(h).padStart(2,'0') + '_' + String(slotMin).padStart(2,'0');
  }

  async function _loadDepartureWindow(slotKey){
    if (_depsCacheKey === slotKey && _depsCacheData !== null) return _depsCacheData;
    try{
      const r = await fetch('data/departures_5min/' + slotKey + '.json');
      if (!r.ok) throw new Error('HTTP '+r.status);
      const data = await r.json();
      _depsCacheKey = slotKey;
      _depsCacheData = (data && typeof data === 'object') ? data : {};
      return _depsCacheData;
    }catch(e){
      console.warn('_loadDepartureWindow fejl ('+slotKey+'):', e);
      _depsCacheKey = slotKey;
      _depsCacheData = {};
      return {};
    }
  }

  async function findNearestGtfsStop(lat, lng, radiusMeters){
    if (radiusMeters === undefined) radiusMeters = 800;
    try{
      const stops = await loadGtfsStops();
      if (!stops.length) return null;
      // Begrænset bounding box for hurtig filtrering
      const latDelta = radiusMeters / 111320;
      const lonDelta = radiusMeters / (111320 * Math.cos(lat * Math.PI / 180));
      let best = null, bestDist = Infinity;
      for (let i = 0; i < stops.length; i++){
        const s = stops[i];
        if (s.lat < lat - latDelta || s.lat > lat + latDelta) continue;
        const sLon = s.lon !== undefined ? s.lon : s.lng;
        if (sLon < lng - lonDelta || sLon > lng + lonDelta) continue;
        const d = _haversineDist(lat, lng, s.lat, sLon);
        if (d < bestDist){ bestDist = d; best = s; }
      }
      if (!best || bestDist > radiusMeters) return null;
      const bestLon = best.lon !== undefined ? best.lon : best.lng;
      const stopId = best.stop_id !== undefined ? best.stop_id : best.id;
      return { stop_id: stopId, name: best.name, lat: best.lat, lon: bestLon, dist: Math.round(bestDist) };
    }catch(e){ console.warn('findNearestGtfsStop fejl:', e); return null; }
  }

  async function fetchGtfsDepartures(stopId){
    try{
      const slotKey = _getDepartureSlotKey();
      const [depsWindow, routeLookup] = await Promise.all([
        _loadDepartureWindow(slotKey),
        loadGtfsRoutes()
      ]);
      const entries = depsWindow[stopId];
      if (!entries || !entries.length) return [];
      return entries.slice(0, 8).map(e => {
        const label = e.short_name || routeLookup[e.route_id] || e.route_id || '';
        const timeStr = (e.departure || e.arrival || '').substring(0, 5);
        return { name: label, time: timeStr };
      });
    }catch(e){ console.warn('fetchGtfsDepartures fejl:', e); return []; }
  }

  // Generates sorted GTFS slot keys covering one full service day (04:00–27:55),
  // then wraps back to 04:00. Used to scan for the next available departure.
  function _getDaySlotKeys(){
    const keys = [];
    for (let h = 4; h <= 27; h++){
      for (let m = 0; m < 60; m += 5){
        keys.push(String(h).padStart(2,'0') + '_' + String(m).padStart(2,'0'));
      }
    }
    return keys;
  }

  // Finds the next departure for stopId after the current time window.
  // Returns { routeShortName: string, nextTime: string } or null if not found.
  async function fetchNextGtfsDeparture(stopId){
    try{
      const routeLookup = await loadGtfsRoutes();
      const currentKey = _getDepartureSlotKey();
      const allKeys = _getDaySlotKeys();
      const currentIdx = allKeys.indexOf(currentKey);
      // Build search order: slots after current first, then wrap from start of day
      const ordered = currentIdx >= 0
        ? [...allKeys.slice(currentIdx + 1), ...allKeys.slice(0, currentIdx + 1)]
        : allKeys;
      const MAX_CHECKS = 60; // limit to ~5 hours (60 × 5 min slots) to avoid excessive requests
      let checked = 0;
      for (const key of ordered){
        if (checked >= MAX_CHECKS) break;
        checked++;
        try{
          const r = await fetch('data/departures_5min/' + key + '.json');
          if (!r.ok) continue;
          const data = await r.json();
          const entries = data[stopId];
          if (entries && entries.length){
            const e = entries[0];
            const shortName = e.short_name || routeLookup[e.route_id] || e.route_id || '';
            const timeStr = (e.departure || e.arrival || '').substring(0, 8);
            return { routeShortName: shortName, nextTime: timeStr };
          }
        }catch(e){ continue; }
      }
      return null;
    }catch(e){ console.warn('fetchNextGtfsDeparture fejl:', e); return null; }
  }

  // Build a stop_id → stop object map from the already-loaded _gtfsStops array
  function _ensureGtfsStopMap(){
    if (_gtfsStopMap) return;
    _gtfsStopMap = new Map();
    if (_gtfsStops){
      _gtfsStops.forEach(s => {
        const id = String(s.stop_id !== undefined ? s.stop_id : (s.id || ''));
        if (id) _gtfsStopMap.set(id, s);
      });
    }
  }

  // Attach a click popup to a route-stop marker showing stop name, route, and departure time
  function _attachRouteStopPopup(marker, stopName, routeName, departureTime){
    function buildHtml(){
      let h = '<div class="oex-bp-title">🚏 '+escapeHtml(stopName)+'</div>';
      h += '<div class="oex-bp-dep">';
      if (routeName) h += '<span class="oex-bp-line">'+escapeHtml(routeName)+'</span>';
      if (departureTime) h += '<span class="oex-bp-time">'+escapeHtml(departureTime)+'</span>';
      h += '</div>';
      return h;
    }

    function showPopup(e){
      e.stopPropagation();
      const mapWrap = document.querySelector('.map-wrap');
      if (!mapWrap) return;
      if (_busStopPopup && _busStopPopup._oexMarker === marker){ _closeBusStopPopup(); return; }
      _closeBusStopPopup();
      const popup = document.createElement('div');
      popup.className = 'oex-busstop-popup';
      popup._oexMarker = marker;
      popup.innerHTML = buildHtml();

      const wrapRect = mapWrap.getBoundingClientRect();
      if (markerEl){
        const mRect = markerEl.getBoundingClientRect();
        popup.style.left = (mRect.left - wrapRect.left + mRect.width / 2) + 'px';
        popup.style.top  = (mRect.top  - wrapRect.top) + 'px';
      } else {
        popup.style.left = '50%'; popup.style.top = '40%';
      }
      mapWrap.appendChild(popup);
      _busStopPopup = popup;
    }

    function tryAttach(){
      const el = marker.getElement ? marker.getElement() : null;
      if (el && !el._oexRsPopupAttached){
        el._oexRsPopupAttached = true;
        el.style.cursor = 'pointer';
        el.addEventListener('click', showPopup);
      }
    }
    tryAttach();
    setTimeout(tryAttach, 200);
  }

  // Find all stops sharing the next-departure route_id for the given stop,
  // then place small clickable pin markers on the map for each stop along the route.
  async function _findAndShowRouteStops(stop1){
    if (!stop1 || !stop1.stop_id) return;
    try{
      const routeLookup = await loadGtfsRoutes();
      await loadGtfsStops();
      _ensureGtfsStopMap();

      // Find the soonest departure at stop1 – start from current slot, then scan forward
      const currentKey = _getDepartureSlotKey();
      const allKeys = _getDaySlotKeys();
      const currentIdx = allKeys.indexOf(currentKey);
      const ordered = currentIdx >= 0
        ? [...allKeys.slice(currentIdx), ...allKeys.slice(0, currentIdx)]
        : allKeys;

      let routeId = null;
      let routeShortName = '';
      let activeWindow = null;
      const MAX_CHECKS = 60;
      let checked = 0;
      for (const key of ordered){
        if (checked >= MAX_CHECKS) break;
        checked++;
        try{
          const r = await fetch('data/departures_5min/' + key + '.json');
          if (!r.ok) continue;
          const data = await r.json();
          const entries = data[stop1.stop_id];
          if (entries && entries.length){
            const e = entries[0];
            routeId = e.route_id;
            routeShortName = e.short_name || routeLookup[routeId] || routeId || '';
            activeWindow = data;
            break;
          }
        }catch(_){ continue; }
      }
      if (!routeId || !activeWindow) return;

      // Collect all stops in this window that share the same route_id
      const routeStops = [];
      for (const [stopId, entries] of Object.entries(activeWindow)){
        if (!Array.isArray(entries)) continue;
        for (const e of entries){
          if (e.route_id === routeId){
            routeStops.push({ stop_id: stopId, departure: (e.departure || e.arrival || '').substring(0, 5) });
            break;
          }
        }
      }
      // Sort by departure time (proxy for stop sequence)
      routeStops.sort((a, b) => a.departure.localeCompare(b.departure));

      // Place a small pin marker for each stop (skip the A stop itself)
      for (const rs of routeStops){
        if (rs.stop_id === String(stop1.stop_id)) continue;
        const stopInfo = _gtfsStopMap.get(String(rs.stop_id));
        if (!stopInfo) continue;
        const lat = stopInfo.lat;
        const lon = stopInfo.lon !== undefined ? stopInfo.lon : stopInfo.lng;
        if (!isValidLatLon(lat, lon)) continue;

        const marker = new atlas.HtmlMarker({
          position: [lon, lat],
          htmlContent: '<div class="oex-routestop-pin"></div>'
        });
        map.markers.add(marker);
        busMarkers.push(marker);
        _attachRouteStopPopup(marker, stopInfo.name || rs.stop_id, routeShortName, rs.departure);
      }
    }catch(e){ console.warn('_findAndShowRouteStops fejl:', e); }
  }

  async function findAndShowTransit(){
    clearBusDisplay();
    const lat1 = readNum("lat1"), lng1 = readNum("lng1"), lat2 = readNum("lat2"), lng2 = readNum("lng2");
    const hasA = isValidLatLon(lat1, lng1);
    const hasB = isValidLatLon(lat2, lng2);
    if (!hasA) return;

    const [stop1, stop2] = await Promise.all([
      hasA ? findNearestGtfsStop(lat1, lng1) : Promise.resolve(null),
      hasB ? findNearestGtfsStop(lat2, lng2) : Promise.resolve(null)
    ]);

    const [deps1, deps2] = await Promise.all([
      (stop1 && stop1.stop_id) ? fetchGtfsDepartures(stop1.stop_id) : Promise.resolve([]),
      (stop2 && stop2.stop_id) ? fetchGtfsDepartures(stop2.stop_id) : Promise.resolve([])
    ]);

    const [nextDep1, nextDep2] = await Promise.all([
      (stop1 && stop1.stop_id && (!deps1 || !deps1.length)) ? fetchNextGtfsDeparture(stop1.stop_id) : Promise.resolve(null),
      (stop2 && stop2.stop_id && (!deps2 || !deps2.length)) ? fetchNextGtfsDeparture(stop2.stop_id) : Promise.resolve(null)

    if (stop1){

      });
      map.markers.add(m); busMarkers.push(m);
      _attachBusStopPopup(m, stop2, deps2, nextDep2);
    }

    if (hasA && hasB){
      try{
        const url = 'https://atlas.microsoft.com/route/directions/json'+
          '?api-version=1.0'+
          '&travelMode=bus'+
          '&subscription-key='+encodeURIComponent(AZURE_MAPS_KEY)+
          '&query='+encodeURIComponent(`${lat1},${lng1}:${lat2},${lng2}`);
        const res = await fetch(url, { credentials:'omit' });
        if (res.ok){
          const data = await res.json();
          const route = (((data||{}).routes||[])[0]||{});
          let coords = [];
          const legs = route.legs || [];
          legs.forEach(leg=>{ (leg.points||[]).forEach(p=>{ if(isValidLatLon(p.latitude, p.longitude)){ coords.push([p.longitude,p.latitude]); } }); });
          if (coords.length >= 2){
            routeSource.add(new atlas.data.Feature(new atlas.data.LineString(coords)));
            const summary = route.summary || {};
            if (summary.lengthInMeters && summary.travelTimeInSeconds){
              const label = formatRouteLabel(summary.lengthInMeters, summary.travelTimeInSeconds);
              const mid = routeMidpoint(coords);
              routeLabelMarker = new atlas.HtmlMarker({
                position: mid,
                htmlContent: '<div style="background:#000000;color:#ffffff;padding:4px 10px;border-radius:4px;border:2px solid #00B0F8;font-size:13px;font-weight:bold;white-space:nowrap;font-family:sans-serif;">🚌 '+label+'</div>'
              });
              map.markers.add(routeLabelMarker);

            try { map.setCamera({ bounds: atlas.data.BoundingBox.fromLatLngs(coords), padding: 60, duration: 500 }); } catch(e) {}
            setTimeout(safeResize, 50);

  // ===== IP FALLBACK =====
  let _oexTriedIpFallback = false;
  function parseBoundsFromResult(r){
    if (!r) return null;
    if (r.viewport && r.viewport.topLeftPoint && r.viewport.btmRightPoint){
      const tl = r.viewport.topLeftPoint; const br = r.viewport.btmRightPoint;
      if (isFiniteNumber(tl.lat) && isFiniteNumber(tl.lon) && isFiniteNumber(br.lat) && isFiniteNumber(br.lon))
        return [tl.lon, br.lat, br.lon, tl.lat];
    }
    if (r.boundingBox && r.boundingBox.northEast && r.boundingBox.southWest){
      const ne = r.boundingBox.northEast; const sw = r.boundingBox.southWest;
      if (isFiniteNumber(ne.lat) && isFiniteNumber(ne.lon) && isFiniteNumber(sw.lat) && isFiniteNumber(sw.lon))
        return [sw.lon, sw.lat, ne.lon, ne.lat];
    }
    return null;
  }
  async function oexIpFallbackCenter(){
    if (_oexTriedIpFallback) return;
    try{
      const ipUrl = 'https://atlas.microsoft.com/geolocation/ip/json?api-version=1.0&subscription-key=' + encodeURIComponent(AZURE_MAPS_KEY);
      const ipRes = await fetch(ipUrl, {credentials:'omit'});
      if(!ipRes.ok){ console.warn('IP fallback HTTP', ipRes.status); throw new Error('HTTP '+ipRes.status); }
      const ipData = await ipRes.json();
      let lat=null, lng=null, bbox=null, cc=null;
      if (ipData && ipData.location && isFiniteNumber(ipData.location.lat) && isFiniteNumber(ipData.location.lon)){
        lat = ipData.location.lat; lng = ipData.location.lon;
      }
      if (ipData && ipData.countryCode){ cc = ipData.countryCode; }
      if ((lat===null || lng===null) && cc){
        const fUrl = 'https://atlas.microsoft.com/search/fuzzy/json?api-version=1.0&limit=1&subscription-key=' + encodeURIComponent(AZURE_MAPS_KEY) + '&query=' + encodeURIComponent(cc);
        const fRes = await fetch(fUrl, {credentials:'omit'});
        if (fRes.ok){
          const fData = await fRes.json();
          const r = (fData && fData.results && fData.results[0]) || null;
          bbox = parseBoundsFromResult(r);
          if (!bbox && r && r.position && isValidLatLon(r.position.lat, r.position.lon)){
            lat = r.position.lat; lng = r.position.lon;
          }
        }
      }
      const latEl = document.getElementById('lat1');
      const lngEl = document.getElementById('lng1');
      const nameEl = document.getElementById('name1');
      if (isValidLatLon(lat,lng)){
        if (latEl) latEl.value = lat.toFixed(6);
        if (lngEl) lngEl.value = lng.toFixed(6);
        if (nameEl && !nameEl.value.trim()) nameEl.value = 'IP-LOKATION (GROV)';
        await updateMapFromForm(false, true);
        safeSetCenter(lat, lng, 8.5, 600);
        setStatusChip('IP • GROV' + (cc?(' ('+cc+')'):'') , false);
        _oexTriedIpFallback = true;
      } else if (Array.isArray(bbox) && bbox.length===4 && bbox.every(isFiniteNumber)){
        if (nameEl && !nameEl.value.trim()) nameEl.value = 'IP-LOKATION (LAND)';
        await updateMapFromForm(false, true);
        try{ map.setCamera({ bounds: bbox, padding: 60, duration: 600 }); }catch(e){}
        setStatusChip('IP • GROV' + (cc?(' ('+cc+')'):'') , false);
        _oexTriedIpFallback = true;
      } else {
        console.warn('IP fallback: ingen brugbar lokation/bounds. Ingen zoom.');
      }
    }catch(e){ console.warn('IP fallback fejlede', e); }
  }

  // ===== Min position / Auto-track =====
  async function oexGetMyPosition(){
    if (!navigator.geolocation){ alert('Geolocation ikke understøttet i denne browser. Viser grov IP-lokation.'); await oexIpFallbackCenter(); return; }
    const geoget = (opts)=> new Promise((resolve,reject)=>{ navigator.geolocation.getCurrentPosition(resolve, reject, opts); });
    let pos=null;
    try{ pos = await geoget({ enableHighAccuracy:true, timeout:8000, maximumAge:0 }); }
    catch(e1){
      try{ pos = await geoget({ enableHighAccuracy:false, timeout:8000, maximumAge:60000 }); }
      catch(e2){ await oexIpFallbackCenter(); alert('Kunne ikke hente præcis position. Viser grov IP-lokation.'); return; }
    }
    if (!pos || !pos.coords){ await oexIpFallbackCenter(); return; }
    const lat = Number(pos.coords.latitude), lng = Number(pos.coords.longitude);
    if (!isValidLatLon(lat,lng)){ await oexIpFallbackCenter(); return; }
    const latEl = document.getElementById('lat1'); const lngEl = document.getElementById('lng1'); const nameEl = document.getElementById('name1');
    if (latEl) latEl.value = lat.toFixed(6); if (lngEl) lngEl.value = lng.toFixed(6); if (nameEl && !nameEl.value.trim()) nameEl.value = 'MIN POSITION';
    const addrEl = document.getElementById('addr1'); if (addrEl && !addrEl.value.trim()) addrEl.value = 'MIN POSITION';
    const hdg = (pos.coords && typeof pos.coords.heading === 'number' && Number.isFinite(pos.coords.heading)) ? pos.coords.heading : null; if (hdg !== null) { try{ map.setCamera({ bearing: hdg }); }catch(e){} }
    setStatusChip('LIVE • GPS', true);
    updateMapFromForm(false);
  }
  function updateGpsStatus(on){ setStatusChip(on? 'LIVE • GPS':'PAUSE', !!on); }
  let oexWatchId = null; let oexAutoCenter = true;
  function oexStartAutoTrack(options={highAccuracy:true}){
    if (!('geolocation' in navigator)) { alert('Geolocation ikke understøttet i denne browser. Viser grov IP-lokation.'); oexIpFallbackCenter(); return; }
    if (oexWatchId!==null) return; updateGpsStatus(true);
    try{
      oexWatchId = navigator.geolocation.watchPosition(
        (pos)=>{
          if(!pos||!pos.coords) return; const lat=Number(pos.coords.latitude), lng=Number(pos.coords.longitude); if(!isValidLatLon(lat,lng)) return;
          const latEl=document.getElementById('lat1'); const lngEl=document.getElementById('lng1'); const nameEl=document.getElementById('name1');
          if (latEl) latEl.value=lat.toFixed(6); if (lngEl) lngEl.value=lng.toFixed(6); if (nameEl && !nameEl.value.trim()) nameEl.value='MIN POSITION';
          updateMapFromForm(true, true);
          if (oexAutoCenter){ try{ const cam=map.getCamera(); map.setCamera({ center:[lng,lat], zoom: cam.zoom||15.5, duration:300 }); }catch(e){} }
          try{ if(typeof pos.coords.heading==='number' && Number.isFinite(pos.coords.heading)){ map.setCamera({ bearing: pos.coords.heading }); } }catch(e){}
        },
        async (err)=>{
          console.warn('watchPosition fejl:', err);
          const msg = err && err.code===1 ? 'TILLADELSE NÆGTET' : (err && err.code===2 ? 'POSITION UTILGÆNGELIG' : 'TIMEOUT');
          setStatusChip(msg, false);
          await oexIpFallbackCenter();
          updateGpsStatus(false);
        },
        { enableHighAccuracy: !!options.highAccuracy, maximumAge: 5000, timeout: 10000 }
      );
    }catch(e){ console.error('Kunne ikke starte auto-tracking:', e); }
  }
  function oexStopAutoTrack(){ if (oexWatchId!==null){ try{ navigator.geolocation.clearWatch(oexWatchId); }catch(_){} oexWatchId=null; } updateGpsStatus(false); }

  function oexBuildShareUrl(){
    try{
      const cam = map && map.getCamera ? map.getCamera() : {};
      const center = cam && cam.center ? cam.center : [10.2039,56.1629];
      const zoom = (cam && typeof cam.zoom==='number' && Number.isFinite(cam.zoom)) ? cam.zoom : 12;
      const bearing = (cam && typeof cam.bearing==='number' && Number.isFinite(cam.bearing)) ? cam.bearing : 0;
      const pitch = (cam && typeof cam.pitch==='number' && Number.isFinite(cam.pitch)) ? cam.pitch : 0;
      const params = new URLSearchParams();

      const a1 = (document.getElementById('addr1')?.value||'').trim();
      const a2 = (document.getElementById('addr2')?.value||'').trim();
      if(a1) params.set('addr1', a1);
      if(a2) params.set('addr2', a2);

      const lat1 = (document.getElementById('lat1')?.value||'').trim();
      const lng1 = (document.getElementById('lng1')?.value||'').trim();
      const lat2 = (document.getElementById('lat2')?.value||'').trim();
      const lng2 = (document.getElementById('lng2')?.value||'').trim();
      if(lat1 && lng1){ params.set('pos1', `${lat1},${lng1}`); }
      if(lat2 && lng2){ params.set('pos2', `${lat2},${lng2}`); }

      if(Array.isArray(center) && center.length===2){ params.set('center', `${center[1].toFixed(6)},${center[0].toFixed(6)}`); }
      params.set('zoom', Number(zoom||0).toFixed(2));
      params.set('bearing', Number(bearing||0).toFixed(1));
      params.set('pitch', Number(pitch||0).toFixed(1));

      const live = document.getElementById('oex-gps-status')?.textContent?.includes('LIVE') ? '1' : '0';
      params.set('live', live);
      params.set('view', _oexView);

      const url = `${location.origin}${location.pathname}?${params.toString()}`;
      return url;
    }catch(e){ console.warn('oexBuildShareUrl fejl', e); return location.href; }
  }
  function oexShareCurrentView(){
    const url = oexBuildShareUrl();
    if(navigator.share){ try{ navigator.share({ title: document.title || 'OEX Kort', url }); }catch(_){} }
    try{ window.prompt('Kopiér link til visningen:', url); }catch(_){ }

      }).catch(()=>{});
    }
  }
